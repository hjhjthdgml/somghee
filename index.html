// ─── 시트4: 월간 고정지출 ────────────────────────
function rDebtS4(){
  const s=DB.debt?.sheet4||{};
  const items=s.items||[];
  const sub=!!s.submitted;
  const total=items.reduce((a,x)=>a+Number(x.amt||0),0);
  const icoOf=c=>c==='대출 상환'?'💳':c==='카드론/현금서비스'?'🃏':c==='보험'?'🛡':c==='통신'?'📱':c==='주거/관리비'?'🏠':c==='교육/육아'?'📚':c==='생활비'?'🛒':'📋';
  const clOf=c=>c==='대출 상환'?'red':c==='카드론/현금서비스'?'yellow':c==='보험'?'green':c==='통신'?'blue':c==='교육/육아'?'purple':'gray';
  const cats=[...new Set(items.map(x=>x.cat))];
  const list=cats.length?cats.map(cat=>{
    const its=items.filter(x=>x.cat===cat);
    const catTotal=its.reduce((a,x)=>a+Number(x.amt||0),0);
    return`<div class="sec" style="margin-bottom:10px">

      ${its.map(x=>{const gi=items.indexOf(x);return`<div class="li"><div class="li-ico ${clOf(cat)}">${icoOf(cat)}</div>
        <div class="li-body"><div class="li-name">${x.name||'-'}</div><div class="li-sub">${x.dueDay?`매월 ${x.dueDay}일 ·`:''} ${x.method||''}</div></div>

  const hero=items.length?`<div class="hero blue" style="margin-bottom:12px"><div class="hero-label">월 고정지출 합계</div><div class="hero-amount">${W(total)}</div><div class="hero-row"><div><div class="hsl">항목 수</div><div class="hsv">${items.length}개</div></div><div><div class="hsl">대출/카드론</div><div class="hsv">${W(items.filter(x=>x.cat==='대출 상환'||x.cat==='카드론/현금서비스').reduce((a,x)=>a+Number(x.amt||0),0))}</div></div></div></div>`:'';
  if(sub) return dLock(s.submittedAt)+hero+list;
  if(role==='wife') return (items.length?hero+list:dWait());
  const csvCard=`<div class="form-card" style="border:2px dashed var(--green);background:var(--green-l);margin-bottom:12px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px"><span style="font-size:22px">📥</span>
    <div><div style="font-size:13px;font-weight:800;color:var(--green)">구글 시트로 일괄 등록</div>
    <div style="font-size:12px;color:var(--t3);margin-top:1px">템플릿 ⬇️ → 구글 시트에 작성 → CSV 다운로드 → ⬆️ 업로드</div></div></div>
    <div style="display:flex;gap:8px">
      <label for="ds4Up" style="flex:2;padding:11px;background:var(--green);color:#fff;border-radius:10px;font-size:13px;font-weight:700;text-align:center;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px">⬆️ CSV 업로드</label>
      <input type="file" id="ds4Up" accept=".csv,.xlsx,.xls" style="display:none" onchange="handleDebtUpload(event,'s4')">
      <button onclick="downloadDebtTmpl('s4')" style="flex:1;padding:11px;background:#fff;color:var(--green);border:1.5px solid var(--green);border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">템플릿 ⬇️</button>
    </div>
    <div id="ds4Preview"></div>
  </div>`;
  const form=`<div class="form-card">
    <div class="form-ttl">+ 고정지출 직접 입력</div>
    <div class="fr2">
      <div class="field"><label>구분</label><select id="fx-cat"><option>대출 상환</option><option>카드론/현금서비스</option><option>보험</option><option>주거/관리비</option><option>통신</option><option>교육/육아</option><option>생활비</option><option>구독</option><option>기타</option></select></div>
      <div class="field"><label>항목명</label><input id="fx-name" placeholder="예: 국민은행 원금"></div>
    </div>

      <div class="field"><label>금액</label><input type="number" id="fx-amt" placeholder="0" inputmode="numeric"></div>
      <div class="field"><label>납부일 (매월 N일)</label><input type="number" id="fx-day" placeholder="25" min="1" max="31" inputmode="numeric"></div>

      <div class="field"><label>메모</label><input id="fx-note" placeholder="선택 사항"></div>
    </div>
    <button class="btn-p green" onclick="debtAddFixed()">+ 추가</button>
  </div>`;
  return csvCard+(items.length?hero+list+dSubmitBtn('sheet4',items.length):'')+form;
}

function dEnsure(sheet){if(!DB.debt)DB.debt={};if(!DB.debt[sheet])DB.debt[sheet]={};}

window.debtAddLoan=async function(){
  const lender=v('dl-lender');
  if(!lender) return toast('대출/은행명을 입력해주세요','⚠️');
  dEnsure('sheet1');
  if(!DB.debt.sheet1.loans) DB.debt.sheet1.loans=[];
  DB.debt.sheet1.loans.push({
    lenderName:lender, loanDate:v('dl-date'), type:v('dl-type'),
    origAmt:Number(v('dl-orig'))||0, remainPrincipal:Number(v('dl-remain'))||0,
    rate:v('dl-rate'), termMonths:v('dl-term'), expireDate:v('dl-expire'),
    monthlyPrincipal:Number(v('dl-mp'))||0, monthlyInterest:Number(v('dl-mi'))||0,
    repaidCount:v('dl-rc'), remainCount:v('dl-rl'),
    overdue:v('dl-over'), collateral:v('dl-coll'), reason:v('dl-reason'),
  });
  await dbSet(P.debt,{sheet1:DB.debt.sheet1});
  toast(lender+' 추가됐어요','📄');
  ['dl-lender','dl-date','dl-orig','dl-remain','dl-rate','dl-term','dl-expire','dl-mp','dl-mi','dl-rc','dl-rl','dl-reason'].forEach(i=>{const e=document.getElementById(i);if(e)e.value='';});
  renderDebt();
};

window.debtSubmit=async function(sheet){
  if(DB.debt?.[sheet]?.submitted){toast('이미 제출됐어요','🔒',2000);return;}
  if(!confirm('정말 최종 제출할까요?\n제출 후에는 절대 수정할 수 없어요.'))return;
  dEnsure(sheet);

  DB.debt[sheet].submittedAt=new Date().toISOString();

  const prevId=type==='s1'?'ds1Preview':'ds4Preview';
  const prev=document.getElementById(prevId);
  if(prev) prev.innerHTML=`<div style="margin-top:10px;text-align:center;color:var(--t3);font-size:13px">⏳ 읽는 중...</div>`;

    const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    let parsed=[];

      const di=rows.findIndex(r=>String(r[0]).includes('대출'))>=0?rows.findIndex(r=>String(r[0]).includes('대출'))+1:1;

          repaidCount:String(r[10]||''),remainCount:String(r[11]||''),

    } else {
      const di=rows.findIndex(r=>String(r[0]).includes('구분'))>=0?rows.findIndex(r=>String(r[0]).includes('구분'))+1:1;
      for(let i=di;i<rows.length;i++){

    debtPrev=parsed; debtPrevType=type;
    const total=parsed.reduce((s,it)=>s+(it.origAmt||it.amt||0),0);
    if(prev) prev.innerHTML=`<div style="margin-top:12px;border-radius:12px;overflow:hidden;border:1px solid var(--border)">
      <div style="background:var(--sf2);padding:10px 14px;font-size:13px;font-weight:700">${parsed.length}개 미리보기 · ${W(total)}</div>
      <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse">
        <tbody>${parsed.map(it=>`<tr style="border-bottom:1px solid var(--border)"><td style="padding:8px 10px;font-size:13px">${it.lenderName||it.name}</td><td style="padding:8px 6px;font-size:11px;color:var(--t3)">${it.type||it.cat||''}</td><td style="padding:8px 10px;font-size:13px;font-weight:700;text-align:right;color:var(--red)">${W(it.origAmt||it.amt)}</td></tr>`).join('')}</tbody>
      </table></div>
      <div style="padding:12px;border-top:1px solid var(--border)">
        <button onclick="confirmDebtUpload()" style="width:100%;padding:12px;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">✅ ${parsed.length}개 전체 등록</button>
      </div>

// ━━ EXCEL UPLOAD / DOWNLOAD ━━━━━━━━━━━━━━━━━━━━
async function loadSheetJS() {
  if(window.XLSX) return window.XLSX;
  return new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload=()=>res(window.XLSX); s.onerror=rej;
    document.head.appendChild(s);
  });
}

let xlsxPreviewData=[], xlsxPreviewType='';

window.handleXlsxUpload = async function(e, type) {
  const file=e.target.files[0]; if(!file) return;
  const preview=document.getElementById('uploadPreview');
  preview.innerHTML=`<div style="margin-top:12px;text-align:center;color:var(--t3);font-size:13px">⏳ 파일 읽는 중...</div>`;
  try {
    const XLSX=await loadSheetJS();
    const buf=await file.arrayBuffer();
    const wb=XLSX.read(buf,{type:'array'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});

    // 헤더행 찾기
    let dataStart=3;
    for(let i=0;i<Math.min(rows.length,8);i++){
      const row=rows[i].map(c=>String(c).trim());
      if(row.some(c=>c.includes('항목명')||c.includes('이름')||c.includes('대출처')||c.includes('카드사'))) { dataStart=i+1; break; }
    }

    let parsed=[];
    if(type==='repay') {
      // 대출/상환 항목
      for(let i=dataStart;i<rows.length;i++){
        const r=rows[i];
        const name=String(r[0]||'').trim(), amt=Number(String(r[3]||r[2]||'0').replace(/[^0-9.-]/g,''));
        if(!name||!amt) continue;
        parsed.push({name, cat:String(r[2]||'대출 상환').trim()||'대출 상환', amount:amt,
          bank:String(r[0]||'').trim(), account:String(r[5]||'').trim(),
          dueDay:String(r[7]||'').replace(/[^0-9]/g,''),
          remain:Number(String(r[4]||'0').replace(/[^0-9.-]/g,'')),
          rate:Number(String(r[5]||'0').replace(/[^0-9.-]/g,'')),
        });
      }
    } else if(type==='fixed') {
      // 고정지출
      for(let i=dataStart;i<rows.length;i++){
        const r=rows[i];
        const name=String(r[1]||r[0]||'').trim(), amt=Number(String(r[2]||'0').replace(/[^0-9.-]/g,''));
        if(!name||!amt) continue;
        parsed.push({name, cat:String(r[0]||'기타').trim()||'기타', amount:amt,
          dayNum:String(r[3]||'').replace(/[^0-9]/g,''),
          method:String(r[4]||'자동이체').trim(), note:String(r[5]||'').trim()
        });
      }
    } else if(type==='card') {
      // 카드 청구
      for(let i=dataStart;i<rows.length;i++){
        const r=rows[i];
        const name=String(r[0]||'').trim(), amt=Number(String(r[2]||'0').replace(/[^0-9.-]/g,''));
        if(!name||!amt) continue;
        parsed.push({name, amount:amt, dueDay:String(r[1]||'').replace(/[^0-9]/g,''), note:String(r[3]||'').trim()});
      }
    }

    if(!parsed.length) { preview.innerHTML=`<div style="margin-top:12px;background:var(--red-l);border-radius:10px;padding:12px;color:var(--red);font-size:13px;font-weight:600">⚠️ 유효한 데이터가 없어요</div>`; return; }

    xlsxPreviewData=parsed; xlsxPreviewType=type;
    const total=parsed.reduce((s,it)=>s+(it.amount||0),0);
    const rows_html=parsed.map((it,i)=>`<tr style="border-bottom:1px solid var(--border)">
      <td style="padding:8px 10px;font-size:13px;font-weight:600">${it.name}</td>
      <td style="padding:8px 6px;font-size:11px"><span class="tag tag-blue">${it.cat||''}</span></td>
      <td style="padding:8px 10px;font-size:13px;font-weight:700;text-align:right;color:var(--red)">${W(it.amount)}</td>
      <td style="padding:4px"><button onclick="xlsxPreviewData.splice(${i},1);reRenderPreview()" style="background:none;border:none;color:var(--t4);cursor:pointer;font-size:15px">×</button></td>
    </tr>`).join('');
    preview.innerHTML=`<div style="margin-top:14px;border-radius:12px;overflow:hidden;border:1px solid var(--border)">
      <div style="background:var(--sf2);padding:10px 14px;display:flex;align-items:center;justify-content:space-between">
        <div style="font-size:13px;font-weight:700">${parsed.length}개 · ${W(total)}</div>
        <button onclick="xlsxPreviewData=[];document.getElementById('uploadPreview').innerHTML=''" style="font-size:11px;color:var(--t3);background:none;border:none;cursor:pointer;font-family:inherit">취소</button>
      </div>
      <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse">
        <thead><tr style="background:var(--sf2)"><th style="padding:8px 10px;font-size:11px;font-weight:700;color:var(--t2);text-align:left">항목명</th><th style="padding:8px 6px;font-size:11px;font-weight:700;color:var(--t2)">구분</th><th style="padding:8px 10px;font-size:11px;font-weight:700;color:var(--t2);text-align:right">금액</th><th></th></tr></thead>
        <tbody>${rows_html}</tbody>
      </table></div>
      <div style="padding:12px;border-top:1px solid var(--border)">
        <button onclick="confirmXlsxImport()" style="width:100%;padding:12px;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">✅ ${parsed.length}개 전체 등록</button>
      </div>
    </div>`;
  } catch(err) {
    console.error(err);
    preview.innerHTML=`<div style="margin-top:12px;background:var(--red-l);border-radius:10px;padding:12px;color:var(--red);font-size:13px;font-weight:600">⚠️ 파일을 읽지 못했어요</div>`;
  }
  e.target.value='';
};

window.reRenderPreview=function(){
  if(!xlsxPreviewData.length){document.getElementById('uploadPreview').innerHTML='';return;}
  const total=xlsxPreviewData.reduce((s,it)=>s+(it.amount||0),0);
  const tbody=document.querySelector('#uploadPreview table tbody');
  if(!tbody)return;
  tbody.innerHTML=xlsxPreviewData.map((it,i)=>`<tr style="border-bottom:1px solid var(--border)">
    <td style="padding:8px 10px;font-size:13px;font-weight:600">${it.name}</td>
    <td style="padding:8px 6px;font-size:11px"><span class="tag tag-blue">${it.cat||''}</span></td>
    <td style="padding:8px 10px;font-size:13px;font-weight:700;text-align:right;color:var(--red)">${W(it.amount)}</td>
    <td style="padding:4px"><button onclick="xlsxPreviewData.splice(${i},1);reRenderPreview()" style="background:none;border:none;color:var(--t4);cursor:pointer;font-size:15px">×</button></td>
  </tr>`).join('');
};

window.confirmXlsxImport = async function() {
  if(!xlsxPreviewData.length) return;
  if(xlsxPreviewType==='repay') {
    const existNames=new Set(DB.items.map(i=>i.name));
    const toAdd=xlsxPreviewData.filter(it=>!existNames.has(it.name)).map(it=>({...it,id:uid(),createdAt:td()}));
    const skipped=xlsxPreviewData.length-toAdd.length;
    DB.items=[...DB.items,...toAdd];
    await dbSet(P.items,{list:DB.items});
    toast(`${toAdd.length}개 등록 완료!${skipped?` (중복 ${skipped}개 제외)`:''}`, '✅', 4000);
  } else if(xlsxPreviewType==='fixed') {
    if(!DB.finance) DB.finance={};
    if(!DB.finance.fixedItems) DB.finance.fixedItems=[];
    const toAdd=xlsxPreviewData.map(it=>({...it,id:uid()}));
    DB.finance.fixedItems=[...DB.finance.fixedItems,...toAdd];
    await dbSet(P.finance(Y,M),DB.finance);
    toast(`고정지출 ${toAdd.length}개 등록 완료!`, '✅', 4000);
  }
  xlsxPreviewData=[]; xlsxPreviewType='';
  renderAll();
};

function renderDash(){document.getElementById('pDash').innerHTML=rDash();}
function rDash(){
  const inc=totalInc(), repay=totalRepay(), cards=totalCards(), other=totalOther();
  const totalExp=repay+cards+other, bal=inc-totalExp;
  const pct=n=>inc?Math.min(Math.round(n/inc*100),100):0;

  // 정산 현황
  const total=DB.items.length;
  const hDone=DB.items.filter(it=>(DB.month[it.id]||{}).husbandChecked).length;
  const wDone=DB.items.filter(it=>(DB.month[it.id]||{}).wifeDone).length;

  // 부채 데이터
  const s1=DB.debt?.sheet1||{}, s2=DB.debt?.sheet2||{}, s4=DB.debt?.sheet4||{};
  const loans=s1.loans||[], cl2=s2.cardLoans||[], pl=s2.personalLoans||[];
  const debtBal=loans.reduce((a,l)=>a+Number(l.remainPrincipal||0),0)
               +cl2.reduce((a,c)=>a+Number(c.balance||0),0)
               +pl.reduce((a,p)=>a+Number(p.amount||0),0);
  const debtMo=loans.reduce((a,l)=>a+Number(l.monthlyPrincipal||0)+Number(l.monthlyInterest||0),0)
              +cl2.reduce((a,c)=>a+Number(c.monthly||0),0);
  const debtCount=loans.length+cl2.length+pl.length;
  const debtSubmitted=!!(s1.submitted||s2.submitted);

  // 고정지출 (시트4)
  const fx=s4.items||[];
  const fxTotal=fx.reduce((a,x)=>a+Number(x.amt||0),0);
  const fxIco=c=>c==='대출 상환'?'💳':c==='카드론/현금서비스'?'🃏':c==='보험'?'🛡':c==='통신'?'📱':c==='주거/관리비'?'🏠':c==='교육/육아'?'📚':c==='생활비'?'🛒':'📋';
  const fxCl=c=>c==='대출 상환'?'red':c==='카드론/현금서비스'?'yellow':c==='보험'?'green':c==='통신'?'blue':c==='교육/육아'?'purple':'gray';

  const hero=`<div class="hero blue">
    <div class="hero-label">${Y}년 ${M}월 수입</div>
    <div class="hero-amount">${W(inc)}</div>
    <div class="hero-row">
      <div><div class="hsl">총 지출</div><div class="hsv">${W(totalExp)}</div></div>
      <div><div class="hsl">잔액</div><div class="hsv" style="color:${bal>=0?'#a8d8ea':'#ffaaaa'}">${W(bal)}</div></div>
      <div><div class="hsl">부채 잔액</div><div class="hsv">${debtSubmitted?W(debtBal):'미등록'}</div></div>
    </div>
  </div>`;

  const flow=`<div class="sec" style="margin-bottom:12px">
    <div class="sec-hdr"><div class="sec-title">이번달 자금 흐름</div></div>
    ${[
      {ico:'💰',label:'수입',amt:inc,cl:'blue',color:'var(--blue)'},
      {ico:'💳',label:'고정상환',amt:repay,cl:'red',color:'var(--red)'},
      {ico:'🃏',label:'카드청구',amt:cards,cl:'yellow',color:'var(--yellow)'},
      {ico:'🛒',label:'기타지출',amt:other,cl:'gray',color:'var(--t3)'},
    ].map(r=>`<div class="li">
      <div class="li-ico ${r.cl}">${r.ico}</div>
      <div class="li-body">
        <div class="li-name">${r.label}</div>
        <div class="prog-bar" style="margin-top:5px"><div class="prog-fill" style="width:${pct(r.amt)}%;background:${r.color}"></div></div>
      </div>
      <div class="li-r"><div class="li-amt" style="color:${r.color}">${W(r.amt)}</div></div>
    </div>`).join('')}
    <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-top:1.5px solid var(--border)">
      <span style="font-size:14px;font-weight:700">잔액</span>
      <span style="font-size:17px;font-weight:900;color:${bal>=0?'var(--green)':'var(--red)'}">${W(bal)}</span>
    </div>
  </div>`;

  const repayCard=total
    ?`<div style="background:var(--surface);border-radius:16px;border:1px solid var(--border);padding:16px;margin-bottom:12px">
      <div style="font-size:13px;font-weight:700;margin-bottom:12px">🔄 이번달 정산 현황</div>
      <div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;font-size:12px;font-weight:600;color:var(--purple);margin-bottom:5px"><span>👨 병찬 확인</span><span>${hDone}/${total}건</span></div>
        <div class="prog-bar"><div class="prog-fill purple" style="width:${Math.round(hDone/total*100)}%"></div></div>
      </div>
      <div>
        <div style="display:flex;justify-content:space-between;font-size:12px;font-weight:600;color:var(--blue);margin-bottom:5px"><span>👩 송희 입금</span><span>${wDone}/${total}건</span></div>
        <div class="prog-bar"><div class="prog-fill blue" style="width:${Math.round(wDone/total*100)}%"></div></div>
      </div>
    </div>`
    :`<div class="notice yellow"><strong>🔄 정산 항목 없음</strong>정산관리 탭에서 상환 항목을 먼저 등록해주세요.</div>`;

  const debtCard=debtSubmitted
    ?`<div class="sec" style="margin-bottom:12px">
      <div class="sec-hdr"><div class="sec-title">🏦 부채 현황</div><div style="font-size:12px;color:var(--t3)">${debtCount}건</div></div>
      <div style="padding:14px 16px">
        <div class="stat-grid sg3" style="margin-bottom:0">
          <div class="stat"><div class="stat-label">총 잔여 부채</div><div class="stat-val c-red" style="font-size:15px">${W(debtBal)}</div></div>
          <div class="stat"><div class="stat-label">월 납입</div><div class="stat-val c-purple" style="font-size:15px">${W(debtMo)}</div></div>
          <div class="stat"><div class="stat-label">대출 건수</div><div class="stat-val" style="font-size:15px">${debtCount}건</div></div>
        </div>
      </div>
    </div>`
    :`<div class="notice yellow"><strong>🏦 부채 현황 미등록</strong>부채관리 탭에서 부채 정보를 등록하면 여기에 표시돼요.</div>`;

  const fxCard=s4.submitted&&fx.length
    ?`<div class="sec" style="margin-bottom:12px">
      <div class="sec-hdr"><div class="sec-title">📋 월 고정지출</div><div class="sec-total">${W(fxTotal)}</div></div>
      ${[...new Set(fx.map(x=>x.cat))].map(cat=>{
        const catAmt=fx.filter(x=>x.cat===cat).reduce((a,x)=>a+Number(x.amt||0),0);
        return`<div class="li">
          <div class="li-ico ${fxCl(cat)}">${fxIco(cat)}</div>
          <div class="li-body"><div class="li-name">${cat}</div></div>
          <div class="li-r"><div class="li-amt red">${W(catAmt)}</div></div>
        </div>`;
      }).join('')}
    </div>`
    :(s4.submitted?'':`<div class="notice yellow"><strong>📋 고정지출 미등록</strong>부채관리 탭 시트4에서 월 고정지출을 등록하면 여기에 표시돼요.</div>`);

  return hero+flow+repayCard+debtCard+fxCard;
}

// ━━ INIT ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
window.addEventListener('load',()=>{
  ['e-date','i-date'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=td();});
  // 역할 캐시가 있으면 바로 PIN 화면으로
  const cached=localStorage.getItem('cachedRole');
  if(cached&&window.PINS[cached])goPin(cached);
});
</script>
