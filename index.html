<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>우리집 관리</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --blue:#3182F6;--blue-d:#1B64DA;--blue-l:#EBF3FE;
  --green:#00C896;--green-l:#E6FAF5;
  --red:#F04452;--red-l:#FFF0F1;
  --yellow:#FFB800;--yellow-l:#FFF8E6;
  --purple:#7B61FF;--purple-l:#F0EDFF;
  --bg:#F8F9FA;--surface:#fff;--sf2:#F2F4F6;
  --border:#E8EBED;--t1:#191F28;--t2:#4E5968;--t3:#8B95A1;--t4:#B0B8C1;
}
body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;font-size:14px}
.screen{display:none;flex-direction:column;min-height:100vh}
.screen.on{display:flex}

/* LOGIN */
#sLogin{align-items:center;justify-content:center;padding:40px 24px;background:var(--bg)}
.logo{font-size:26px;font-weight:900;letter-spacing:-1px}
.logo span{color:var(--blue)}
.logo-sub{font-size:13px;color:var(--t3);margin-top:4px;margin-bottom:52px}
.lcards{width:100%;max-width:340px;display:flex;flex-direction:column;gap:12px}
.lcard{border-radius:18px;padding:22px 20px;display:flex;align-items:center;gap:16px;cursor:pointer;border:2px solid transparent;transition:all .18s;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.lcard:active{transform:scale(.97)}
.lcard.wife{background:var(--blue-l);border-color:#C7DEFE}
.lcard.husband{background:var(--purple-l);border-color:#DDD6FF}
.lcard-ico{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.lcard.wife .lcard-ico{background:var(--blue)}
.lcard.husband .lcard-ico{background:var(--purple)}
.lcard h3{font-size:16px;font-weight:800;color:var(--t1)}
.lcard p{font-size:12px;color:var(--t2);margin-top:3px;line-height:1.4}

/* PIN */
#sPin{align-items:center;justify-content:center;padding:24px;background:var(--bg)}
.pin-badge{font-size:12px;font-weight:800;padding:5px 14px;border-radius:20px;margin-bottom:22px}
.pin-badge.wife{background:var(--blue-l);color:var(--blue)}
.pin-badge.husband{background:var(--purple-l);color:var(--purple)}
.pin-ttl{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-bottom:6px}
.pin-sub{font-size:13px;color:var(--t3);margin-bottom:28px}
.pin-err{font-size:12px;font-weight:600;color:var(--red);min-height:18px;margin-bottom:12px}
.pin-dots{display:flex;gap:12px;margin-bottom:36px}
.pdot{width:14px;height:14px;border-radius:50%;background:var(--border);transition:all .15s}
.pdot.on{background:var(--blue)}.pdot.on.h{background:var(--purple)}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:228px}
.pk{height:62px;border-radius:14px;background:var(--surface);border:1.5px solid var(--border);font-size:20px;font-weight:700;cursor:pointer;color:var(--t1);font-family:inherit;display:flex;align-items:center;justify-content:center;transition:all .12s}
.pk:active{transform:scale(.92);background:var(--sf2)}
.pk.back{font-size:17px;color:var(--t3)}
.pin-back{margin-top:24px;font-size:13px;color:var(--t3);background:none;border:none;cursor:pointer;font-family:inherit}

/* APP */
#sApp{background:var(--bg)}
.app-hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:13px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:60}
.hdr-l{display:flex;align-items:center;gap:8px}
.role-chip{font-size:11px;font-weight:800;padding:4px 10px;border-radius:20px}
.role-chip.wife{background:var(--blue-l);color:var(--blue)}
.role-chip.husband{background:var(--purple-l);color:var(--purple)}
.hdr-title{font-size:16px;font-weight:800;letter-spacing:-.3px}
.hdr-r{display:flex;align-items:center;gap:8px}
.sync-wrap{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t3)}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--green)}
.sdot.s{background:var(--yellow);animation:blink 1s infinite}
.sdot.e{background:var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.hbtn{background:none;border:none;cursor:pointer;font-size:12px;color:var(--t3);font-family:inherit;font-weight:600}
.month-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 18px;display:flex;align-items:center;gap:10px}
.mbtn{width:28px;height:28px;border-radius:50%;background:var(--sf2);border:none;cursor:pointer;font-size:15px;color:var(--t2);display:flex;align-items:center;justify-content:center}
.mbtn:active{background:var(--blue-l);color:var(--blue)}
.mlabel{font-size:15px;font-weight:800;letter-spacing:-.3px}
.msummary{margin-left:auto;font-size:11px;color:var(--t3);text-align:right;line-height:1.5}
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:grid;grid-template-columns:repeat(4,1fr);z-index:60;padding-bottom:env(safe-area-inset-bottom)}
.bni{display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0;cursor:pointer;border:none;background:none;font-family:inherit;color:var(--t3);font-size:9px;font-weight:600}
.bni.on{color:var(--blue)}
.bni-ico{font-size:18px;line-height:1}
.page{display:none;padding:16px 16px 110px;animation:fadeUp .2s ease}
.page.on{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* COMPONENTS */
.hero{border-radius:18px;padding:22px 20px;margin-bottom:12px;overflow:hidden;position:relative}
.hero::after{content:’’;position:absolute;top:-30px;right:-30px;width:120px;height:120px;background:rgba(255,255,255,.08);border-radius:50%}
.hero.blue{background:linear-gradient(135deg,var(--blue),var(--blue-d));color:#fff}
.hero-label{font-size:12px;font-weight:600;opacity:.85}
.hero-amount{font-size:30px;font-weight:900;margin-top:6px;letter-spacing:-1px}
.hero-row{display:flex;gap:20px;margin-top:18px}
.hsl{font-size:11px;opacity:.75;font-weight:500}
.hsv{font-size:15px;font-weight:700;margin-top:2px}
.stat-grid{display:grid;gap:10px;margin-bottom:12px}
.sg2{grid-template-columns:1fr 1fr}
.sg3{grid-template-columns:1fr 1fr 1fr}
.stat{background:var(--surface);border-radius:14px;border:1px solid var(--border);padding:14px 15px}
.stat-label{font-size:11px;color:var(--t3);font-weight:600}
.stat-val{font-size:18px;font-weight:900;margin-top:4px;letter-spacing:-.5px}
.stat-sub{font-size:11px;color:var(--t4);margin-top:2px}
.c-blue{color:var(--blue)}.c-green{color:var(--green)}.c-red{color:var(--red)}.c-yellow{color:var(--yellow)}.c-purple{color:var(--purple)}
.sec{background:var(--surface);border-radius:16px;border:1px solid var(--border);overflow:hidden;margin-bottom:12px}
.sec-hdr{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sec-title{font-size:14px;font-weight:700}
.sec-action{font-size:12px;color:var(--blue);font-weight:700;background:none;border:none;cursor:pointer;font-family:inherit}
.sec-total{font-size:13px;font-weight:700;color:var(--red)}
.li{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--border);transition:background .1s}
.li:last-child{border-bottom:none}
.li.done{background:var(--green-l)}.li.pend{background:var(--purple-l)}.li.req{background:var(--yellow-l)}
.li-ico{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.li-ico.blue{background:var(--blue-l)}.li-ico.green{background:var(--green-l)}.li-ico.red{background:var(--red-l)}.li-ico.gray{background:var(--sf2)}.li-ico.purple{background:var(--purple-l)}.li-ico.yellow{background:var(--yellow-l)}
.li-body{flex:1;min-width:0}
.li-name{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.li-sub{font-size:11px;color:var(--t3);margin-top:2px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.li-r{text-align:right;flex-shrink:0;display:flex;align-items:center;gap:8px}
.li-amt{font-size:15px;font-weight:800}
.li-amt.pos{color:var(--blue)}.li-amt.neg{color:var(--t1)}.li-amt.red{color:var(--red)}
.li-date{font-size:11px;color:var(--t3);margin-top:1px}
.xbtn{background:none;border:none;color:var(--t4);cursor:pointer;font-size:18px;padding:2px;line-height:1}
.xbtn:hover{color:var(--red)}
.tag{display:inline-flex;align-items:center;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:700}
.tag-blue{background:var(--blue-l);color:var(--blue)}
.tag-green{background:var(--green-l);color:var(--green)}
.tag-red{background:var(--red-l);color:var(--red)}
.tag-yellow{background:var(--yellow-l);color:var(--yellow)}
.tag-purple{background:var(--purple-l);color:var(--purple)}
.tag-gray{background:var(--sf2);color:var(--t3)}
.cb-vis{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .18s;font-size:12px;font-weight:900;color:#fff;flex-shrink:0}
.cb-vis.pon{border-color:var(--purple);background:var(--purple)}
.cb-vis.gon{border-color:var(--green);background:var(--green)}
.prog-bar{height:6px;background:var(--sf2);border-radius:10px;overflow:hidden;margin-top:8px}
.prog-fill{height:100%;border-radius:10px;transition:width .6s cubic-bezier(.16,1,.3,1)}
.prog-fill.blue{background:var(--blue)}.prog-fill.green{background:var(--green)}.prog-fill.purple{background:var(--purple)}.prog-fill.red{background:var(--red)}
.sc{border-radius:16px;padding:18px;margin-bottom:12px;border:1px solid}
.sc.wait{background:var(--yellow-l);border-color:rgba(255,184,0,.3)}
.sc.ready{background:var(--blue-l);border-color:rgba(49,130,246,.2)}
.sc.done{background:var(--green-l);border-color:rgba(0,200,150,.2)}
.sc-ico{font-size:26px;margin-bottom:8px}
.sc-title{font-size:16px;font-weight:800;letter-spacing:-.3px}
.sc-sub{font-size:13px;color:var(--t2);margin-top:4px;line-height:1.5}
.sc-amt{font-size:24px;font-weight:900;margin-top:10px;letter-spacing:-.5px}
.pl{display:flex;justify-content:space-between;font-size:11px;color:var(--t2);font-weight:600;margin-bottom:5px;margin-top:12px}
.form-card{background:var(--surface);border-radius:16px;border:1px solid var(--border);padding:18px;margin-bottom:12px}
.form-ttl{font-size:13px;font-weight:700;margin-bottom:14px}
.field{margin-bottom:12px}
.field:last-of-type{margin-bottom:0}
.field label{display:block;font-size:11px;font-weight:700;color:var(--t2);margin-bottom:5px}
.field input,.field select{width:100%;background:var(--sf2);border:1.5px solid transparent;border-radius:9px;padding:11px 13px;font-size:14px;font-family:inherit;color:var(--t1);outline:none;transition:all .15s;-webkit-appearance:none}
.field input:focus,.field select:focus{background:var(--surface);border-color:var(--blue);box-shadow:0 0 0 3px rgba(49,130,246,.1)}
.field input::placeholder{color:var(--t4)}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-p{width:100%;padding:13px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:14px;letter-spacing:-.2px;transition:all .15s}
.btn-p:active{transform:scale(.98)}
.btn-p.purple{background:var(--purple)}
.btn-p.green{background:var(--green)}
.btn-s{padding:8px 14px;background:var(--sf2);color:var(--t2);border:none;border-radius:8px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer}
.btn-row{display:flex;gap:8px;margin-top:14px}
.btn-row .btn-p{flex:2;margin-top:0}
.btn-row .btn-s{flex:1}
.btn-approve{background:var(--green-l);color:var(--green);border:none;border-radius:8px;padding:6px 10px;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer}
.btn-danger{background:var(--red-l);color:var(--red);border:none;border-radius:8px;padding:6px 10px;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer}
.tab-bar{display:flex;background:var(--sf2);border-radius:10px;padding:3px;margin-bottom:14px;gap:3px}
.tab{flex:1;padding:9px;border-radius:8px;border:none;background:none;font-family:inherit;font-size:13px;font-weight:600;color:var(--t3);cursor:pointer;transition:all .15s}
.tab.on{background:var(--surface);color:var(--t1);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.notice{border-radius:12px;padding:13px 15px;margin-bottom:12px;font-size:13px;line-height:1.6;border:1px solid}
.notice.yellow{background:var(--yellow-l);border-color:rgba(255,184,0,.3);color:var(--t2)}
.notice.red{background:var(--red-l);border-color:rgba(240,68,82,.2);color:var(--t2)}
.notice strong{display:block;font-weight:800;color:var(--t1);margin-bottom:3px}
.perm-box{background:var(--red-l);border:1px solid rgba(240,68,82,.2);border-radius:12px;padding:14px 16px;margin-bottom:14px;display:flex;gap:10px}
.perm-box .pi{font-size:20px;flex-shrink:0}
.perm-box strong{font-size:13px;font-weight:800;color:var(--red);display:block;margin-bottom:2px}
.perm-box p{font-size:12px;color:var(--t2);line-height:1.5}
.edit-wrap{display:flex;align-items:center;gap:6px;margin-top:8px;flex-wrap:wrap}
.edit-inp{width:110px;background:var(--sf2);border:1.5px solid var(--purple);border-radius:8px;padding:7px 10px;font-size:13px;font-family:inherit;color:var(--t1);outline:none}
.edit-save{padding:7px 11px;background:var(--purple);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.edit-cancel{padding:7px 10px;background:var(--sf2);color:var(--t2);border:none;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit}
.empty{padding:44px 20px;text-align:center;color:var(--t3)}
.empty-ico{font-size:38px;margin-bottom:10px}
.empty p{font-size:13px;font-weight:500;line-height:1.6}
.flow-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.flow-label{font-size:13px;font-weight:600}
.flow-r{text-align:right}
.flow-amt{font-size:14px;font-weight:800}
.flow-pct{font-size:11px;color:var(--t3);margin-top:1px}
#toasts{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none;width:calc(100% - 32px);max-width:360px}
.toast{background:var(--t1);color:#fff;padding:12px 16px;border-radius:12px;font-size:13px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.2);display:flex;align-items:center;gap:10px;width:100%;animation:tin .28s cubic-bezier(.16,1,.3,1)}
@keyframes tin{from{opacity:0;transform:translateY(-10px) scale(.96)}to{opacity:1;transform:none}}
/* ── 가계관리 달력 ── */
.fin-sbar{display:grid;grid-template-columns:1fr 1px 1fr 1px 1fr;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 0;margin-bottom:12px;text-align:center}
.fsb-sep{background:var(--border)}
.fsb-label{font-size:11px;color:var(--t3);font-weight:600}.fsb-val{font-size:14px;font-weight:800;margin-top:3px}
.cal-wrap{background:var(--surface);border-radius:14px;border:1px solid var(--border);padding:10px 6px;margin-bottom:0}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;padding-bottom:8px;border-bottom:1px solid var(--border);margin-bottom:4px}
.cal-dow span{font-size:11px;font-weight:700;color:var(--t3)}
.cal-row{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:2px}
.cal-cell{min-height:56px;padding:4px 2px;cursor:pointer;border-radius:8px;display:flex;flex-direction:column;align-items:center;transition:background .1s}
.cal-cell:active{opacity:.7}.cal-cell.sel{background:var(--blue-l)}
.cal-dn{font-size:13px;font-weight:600;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:50%;line-height:1}
.cal-dn.today{background:var(--t1);color:var(--bg);font-weight:800}
.cal-dn.sun{color:var(--red)}.cal-dn.sat{color:var(--blue)}
.cal-inc{font-size:9px;font-weight:700;color:#0ab;line-height:1.3;margin-top:1px}
.cal-exp{font-size:9px;font-weight:600;color:var(--t2);line-height:1.3}
.tx-day-hdr{font-size:13px;font-weight:700;color:var(--t2);padding:12px 4px 6px}
.tx-item{display:flex;align-items:center;gap:10px;padding:12px 4px;border-bottom:1px solid var(--border)}
.tx-ico{width:42px;height:42px;border-radius:12px;background:var(--sf2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.tx-body{flex:1;min-width:0}
.tx-name{font-size:14px;font-weight:700;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-sub{font-size:11px;color:var(--t3);margin-top:2px}
.tx-amt{font-size:15px;font-weight:800;white-space:nowrap;color:var(--t1)}
.tx-amt.pos{color:#0ab}
.fin-fab{position:fixed;bottom:72px;right:16px;background:var(--t1);color:var(--bg);border:none;border-radius:50px;padding:12px 18px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;z-index:90;box-shadow:0 4px 16px rgba(0,0,0,.25);letter-spacing:-.3px}
.fin-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end}
.fin-modal{background:var(--surface);border-radius:20px 20px 0 0;padding:20px 16px 32px;width:100%;max-height:88vh;overflow-y:auto}
.type-tabs{display:flex;gap:8px}
.type-tab{flex:1;padding:10px;border:none;border-radius:10px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .15s}
.who-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:4px}
.who-item{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:8px 4px;border-radius:12px;border:2px solid transparent;transition:all .1s}
.who-item.sel{border-color:var(--blue);background:var(--blue-l)}
.who-ico{width:48px;height:48px;border-radius:50%;background:var(--sf2);display:flex;align-items:center;justify-content:center;font-size:24px}
.who-name{font-size:11px;font-weight:700;color:var(--t2)}
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:4px}
.cat-item{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:8px 4px;border-radius:12px;border:2px solid transparent;transition:all .1s}
.cat-item.sel{border-color:var(--blue);background:var(--blue-l)}
.cat-ico{width:48px;height:48px;border-radius:50%;background:var(--sf2);display:flex;align-items:center;justify-content:center;font-size:22px}
.cat-lbl{font-size:10px;font-weight:700;color:var(--t2);text-align:center;line-height:1.3}
.modal-sect{font-size:12px;font-weight:700;color:var(--t3);margin:14px 0 8px}
.fin-mgmt-btn{display:inline-flex;align-items:center;gap:4px;background:none;border:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:700;color:var(--t3);padding:4px 0}
</style>

</head>
<body>

<div class="screen on" id="sLogin">
  <div class="logo">우리집 <span>관리</span></div>
  <div class="logo-sub">누구로 접속할까요?</div>
  <div class="lcards">
    <div class="lcard wife" onclick="goPin('wife')">
      <div class="lcard-ico">👩</div>
      <div><h3>아내 (송희)</h3><p>전체 관리 · 입금 처리 · 지출 승인</p></div>
    </div>
    <div class="lcard husband" onclick="goPin('husband')">
      <div class="lcard-ico">👨</div>
      <div><h3>남편</h3><p>월급 입력 · 상환 확인 · 지출 보고</p></div>
    </div>
  </div>
</div>

<div class="screen" id="sPin">
  <div class="pin-badge" id="pinBadge"></div>
  <div class="pin-ttl">PIN 입력</div>
  <div class="pin-sub" id="pinSub">PIN을 입력해주세요</div>
  <div class="pin-err" id="pinErr"></div>
  <div class="pin-dots" id="pinDots">
    <div class="pdot"></div><div class="pdot"></div><div class="pdot"></div><div class="pdot"></div><div class="pdot"></div>
  </div>
  <div class="pin-grid">
    <button class="pk" onclick="pk('1')">1</button><button class="pk" onclick="pk('2')">2</button><button class="pk" onclick="pk('3')">3</button>
    <button class="pk" onclick="pk('4')">4</button><button class="pk" onclick="pk('5')">5</button><button class="pk" onclick="pk('6')">6</button>
    <button class="pk" onclick="pk('7')">7</button><button class="pk" onclick="pk('8')">8</button><button class="pk" onclick="pk('9')">9</button>
    <button class="pk"></button><button class="pk" onclick="pk('0')">0</button><button class="pk back" onclick="pkDel()">⌫</button>
  </div>
  <button class="pin-back" onclick="backToLogin()">다른 계정으로 ↩</button>
</div>

<div class="screen" id="sApp">
  <div class="app-hdr">
    <div class="hdr-l">
      <span class="role-chip" id="roleChip"></span>
      <span class="hdr-title">우리집 관리</span>
    </div>
    <div class="hdr-r">
      <div class="sync-wrap"><div class="sdot" id="sdot"></div><span id="stxt">연결됨</span></div>
      <button class="hbtn" onclick="syncNow()">↻</button>
      <button class="hbtn" onclick="doLogout()">나가기</button>
    </div>
  </div>
  <div class="month-bar">
    <button class="mbtn" onclick="cm(-1)">‹</button>
    <div class="mlabel" id="mlabel"></div>
    <button class="mbtn" onclick="cm(1)">›</button>
    <div class="msummary" id="msummary"></div>
  </div>
  <div class="page" id="pDash"></div>
  <div class="page" id="pRepay"></div>
  <div class="page on" id="pFinance"></div>
  <div class="page" id="pDebt"></div>
  <nav class="bnav">
    <button class="bni" onclick="goPage('dash',this)"><span class="bni-ico">📈</span>대시보드</button>
    <button class="bni" onclick="goPage('repay',this)"><span class="bni-ico">💳</span>정산관리</button>
    <button class="bni on" onclick="goPage('finance',this)"><span class="bni-ico">📊</span>가계관리</button>
    <button class="bni" onclick="goPage('debt',this)"><span class="bni-ico">🏦</span>부채관리</button>
  </nav>
</div>

<div id="toasts"></div>

<script>
// ━━ CONFIG ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ⚙️ Firebase 설정 후 교체
window.FB = {
  apiKey:"YOUR_API_KEY",
  authDomain:"YOUR_PROJECT.firebaseapp.com",
  projectId:"YOUR_PROJECT_ID",
  storageBucket:"YOUR_PROJECT.appspot.com",
  messagingSenderId:"YOUR_SENDER_ID",
  appId:"YOUR_APP_ID"
};
window.PINS = {wife:'13546', husband:'5678'};


// ━━ STATE ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let role=null, Y=new Date().getFullYear(), M=new Date().getMonth()+1;
let DB={items:[],month:{},finance:{},debt:{},cards:[],fixed:[],cats:[]};
let _lastAction=null;
let selDate=''; // lazily initialized in rFinCalendar
let unsubs=[], fbFns=null, curPage='finance';
let tabs={repay:'list', finance:'calendar', debt:'sheet1', finSub:'card'};
const FB_ON = window.FB.apiKey!=='YOUR_API_KEY';

// ━━ FIREBASE ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function initFB() {
  if(!FB_ON) return;
  try {
    const a=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
    const b=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    const app=a.initializeApp(window.FB);
    const db=b.getFirestore(app);
    fbFns={
      get:p=>b.getDoc(b.doc(db,...p.split('/'))).then(s=>s.exists()?s.data():null),
      set:(p,d)=>b.setDoc(b.doc(db,...p.split('/')),d,{merge:true}),
      listen:(p,cb)=>b.onSnapshot(b.doc(db,...p.split('/')),s=>cb(s.exists()?s.data():null),()=>cb(null))
    };
  } catch(e){console.warn('FB fail',e);}
}

// ━━ STORAGE ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const LS={get:k=>{try{return JSON.parse(localStorage.getItem('hh_'+k))}catch{return null}},set:(k,v)=>{try{localStorage.setItem('hh_'+k,JSON.stringify(v))}catch{}}};
const lk=p=>p.replace(/\//g,'_');
async function dbGet(p){
  if(fbFns){const d=await fbFns.get(p).catch(()=>null);if(d){LS.set(lk(p),d);return d;}}
  return LS.get(lk(p));
}
async function dbSet(p,data){
  LS.set(lk(p),{...(LS.get(lk(p))||{}),...data});
  if(fbFns){setSS('s');await fbFns.set(p,data).then(()=>setSS('ok')).catch(()=>setSS('e'));}
  else setSS('local');
}
function dbListen(p,cb){
  if(fbFns){const u=fbFns.listen(p,d=>{if(d)LS.set(lk(p),d);cb(d||LS.get(lk(p)));});unsubs.push(u);return;}
  cb(LS.get(lk(p)));
  const t=setInterval(()=>cb(LS.get(lk(p))),2000);
  unsubs.push(()=>clearInterval(t));
}
function setSS(s){
  const dot=document.getElementById('sdot'),txt=document.getElementById('stxt');
  if(!dot)return;
  dot.className='sdot'+(s==='s'?' s':s==='e'?' e':'');
  dot.style.background=s==='local'?'var(--yellow)':'';
  txt.textContent=s==='s'?'동기화중':s==='e'?'오프라인':s==='local'?'로컬저장':'연결됨';
}

// ━━ UTILS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const W=n=>'₩'+Number(n||0).toLocaleString('ko-KR');
const td=()=>new Date().toISOString().slice(0,10);
const mk=(y,m)=>`${y}-${String(m).padStart(2,'0')}`;
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const v=id=>document.getElementById(id)?.value||'';
function toast(msg,ico='✅',dur=3000){
  const el=document.createElement('div');
  el.className='toast';el.innerHTML=`<span>${ico}</span><span>${msg}</span>`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>{el.style.transition='opacity .25s';el.style.opacity='0';setTimeout(()=>el.remove(),250);},dur);
}

// ━━ PATHS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const P={
  items:'shared/items',
  cards:'shared/cards',
  fixed:'shared/fixed',
  cats:'shared/cats',
  month:(y,m)=>`months/${mk(y,m)}/d`,
  finance:(y,m)=>`finance/${mk(y,m)}/d`,
  debt:'debt/d',
};
const DEFAULT_CATS=['식비','교통','의료/건강','의복','교육','문화/여가','생활용품','기타'];
const CAT_ICONS={'식비':'🍽️','교통':'🚌','의료/건강':'🏥','의복':'👕','교육':'🎓','문화/여가':'🎭','생활용품':'🛒','주거비':'🏠','통신':'📱','기타':'📦','월급':'💰','부업':'💼','이자/배당':'📈'};
const WHO_LIST=[{id:'남편',ico:'👨'},{id:'송희',ico:'👩'},{id:'우리',ico:'👫'},{id:'아기',ico:'👶'},{id:'시댁',ico:'👴'},{id:'처가댁',ico:'👵'},{id:'기타',ico:'👤'}];
function shortW(n){if(n>=10000)return Math.round(n/10000)+'만';if(n>=1000)return Math.round(n/1000)+'천';return String(n);}

// ━━ LOGIN / PIN ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));document.getElementById(id).classList.add('on');}
window.goPin=function(r){
  role=r;pinBuf='';localStorage.setItem('cachedRole',r);show('sPin');
  const b=document.getElementById('pinBadge');
  b.textContent=r==='wife'?'👩 아내 (송희)':'👨 남편';
  b.className='pin-badge '+r;
  document.getElementById('pinErr').textContent='';
  const len=window.PINS[r]?.length||4;
  document.getElementById('pinSub').textContent=`${len}자리 PIN을 입력해주세요`;
  document.getElementById('pinDots').innerHTML=Array.from({length:len},()=>'<div class="pdot"></div>').join('');
  renderDots();
};
let pinBuf='';
window.pk=function(k){const maxLen=window.PINS[role]?.length||4;if(!k||pinBuf.length>=maxLen)return;pinBuf+=k;renderDots();document.getElementById('pinErr').textContent='';if(pinBuf.length===maxLen)setTimeout(checkPin,120);};
window.pkDel=function(){pinBuf=pinBuf.slice(0,-1);renderDots();};
function renderDots(){document.querySelectorAll('.pdot').forEach((d,i)=>{d.className='pdot'+(i<pinBuf.length?' on'+(role==='husband'?' h':''):'');});}
function checkPin(){
  if(pinBuf===window.PINS[role]){show('sApp');enterApp();}
  else{document.getElementById('pinErr').textContent='PIN이 틀렸어요';pinBuf='';renderDots();}
}
window.backToLogin=()=>{localStorage.removeItem('cachedRole');show('sLogin');};
window.doLogout=()=>{unsubs.forEach(u=>typeof u==='function'&&u());unsubs=[];show('sLogin');};
window.syncNow=()=>loadAll().then(renderAll).then(()=>toast('새로고침!','↻',1500));

// ━━ ENTER APP ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function enterApp(){
  const chip=document.getElementById('roleChip');
  chip.textContent=role==='wife'?'👩 아내':'👨 남편';
  chip.className='role-chip '+role;
  updateML();
  await initFB();
  await loadAll();
  startListeners();
  renderAll();
}
async function loadAll(){
  const [it,md,fd,dd,cd,fx,ct]=await Promise.all([dbGet(P.items),dbGet(P.month(Y,M)),dbGet(P.finance(Y,M)),dbGet(P.debt),dbGet(P.cards),dbGet(P.fixed),dbGet(P.cats)]);
  DB.items=it?.list||[];DB.month=md||{};DB.finance=fd||{};DB.debt=dd||{};DB.cards=cd?.list||[];DB.fixed=fx?.list||[];DB.cats=ct?.list||[];
}
function startListeners(){
  unsubs.forEach(u=>typeof u==='function'&&u());unsubs=[];
  dbListen(P.items,d=>{DB.items=d?.list||[];renderAll();});
  dbListen(P.cards,d=>{DB.cards=d?.list||[];renderAll();});
  dbListen(P.fixed,d=>{DB.fixed=d?.list||[];renderAll();});
  dbListen(P.cats,d=>{DB.cats=d?.list||[];renderAll();});
  dbListen(P.month(Y,M),d=>{DB.month=d||{};renderAll();});
  dbListen(P.finance(Y,M),d=>{DB.finance=d||{};renderAll();});
  dbListen(P.debt,d=>{DB.debt=d||{};renderAll();});
}
window.cm=async function(d){M+=d;if(M>12){M=1;Y++;}if(M<1){M=12;Y--;}const ym=mk(Y,M);if(selDate&&!selDate.startsWith(ym))selDate=ym+'-01';updateML();await loadAll();startListeners();renderAll();};
function updateML(){document.getElementById('mlabel').textContent=`${Y}년 ${M}월`;}

// ━━ NAV ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
window.goPage=function(p,btn){
  curPage=p;
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('on'));
  const pageMap={repay:'pRepay',finance:'pFinance',debt:'pDebt',dash:'pDash'};
  document.getElementById(pageMap[p]).classList.add('on');
  document.querySelectorAll('.bni').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  const mb=document.querySelector('.month-bar');
  if(mb) mb.style.display=p==='debt'?'none':'flex';
  renderAll();
};
window.setTab=function(page,tab){tabs[page]=tab;renderAll();};

// ━━ RENDER ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderAll(){
  if(['INPUT','SELECT','TEXTAREA'].includes(document.activeElement?.tagName))return;
  updateBar();if(curPage==='repay')renderRepay();else if(curPage==='finance')renderFinance();else if(curPage==='debt')renderDebt();else renderDash();
}
function getAmt(item){const md=DB.month[item.id]||{};return Number(md.adjustedAmount??item.amount);}
function totalInc(){return Object.values(DB.finance.income||{}).reduce((s,v)=>s+Number(v.amount||0),0);}
function totalCards(){const amts=DB.finance.cards||{};return Object.values(amts).reduce((s,v)=>s+Number(v||0),0);}
function getFixedPrice(item,ym){const h=(item.priceHistory||[]).slice().sort((a,b)=>a.from.localeCompare(b.from));let p=0;for(const e of h){if(e.from<=ym)p=e.amount;}return p;}
function activeCats(){const list=(DB.cats.length?DB.cats:DEFAULT_CATS.map((n,i)=>({id:'d'+i,name:n,deleted:false}))).filter(c=>!c.deleted);return list.map(c=>c.name);}
function totalOther(){
  const ym=mk(Y,M);
  const fixedSum=(DB.fixed||[]).filter(f=>f.active!==false&&(f.priceHistory||[]).some(h=>h.from<=ym)).reduce((s,f)=>s+getFixedPrice(f,ym),0);
  const varSum=Object.values(DB.finance.expenses||{}).filter(e=>!e.pendingApproval).reduce((s,e)=>s+Number(e.amount||0),0);
  return fixedSum+varSum;
}
function totalRepay(){return DB.items.reduce((s,it)=>s+getAmt(it),0);}
function updateBar(){
  const doneCnt=DB.items.filter(it=>(DB.month[it.id]||{}).wifeDone).length;
  const inc=totalInc(), exp=totalRepay()+totalCards()+totalOther();
  document.getElementById('msummary').textContent=
    `상환 ${doneCnt}/${DB.items.length} 완료\n잔액 ${W(inc-exp)}`;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ◉ 정산관리
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderRepay(){
  const el=document.getElementById('pRepay');
  const tab=tabs.repay||'list';
  let tabBar='';
  if(role==='wife') tabBar=`<div class="tab-bar">
    <button class="tab ${tab==='list'?'on':''}" onclick="setTab('repay','list')">이번달 정산</button>
    <button class="tab ${tab==='manage'?'on':''}" onclick="setTab('repay','manage')">항목 관리</button>
  </div>`;
  el.innerHTML=tabBar+'<div id="rc"></div>';
  const rc=document.getElementById('rc');
  if(role==='wife'){if(tab==='list')rc.innerHTML=rRepayWife();else rc.innerHTML=rRepayManage();}
  else rc.innerHTML=rRepayHusband();
}

function rRepayWife(){
  if(!DB.items.length)return`<div class="notice yellow"><strong>📋 등록된 항목이 없어요</strong>항목 관리 탭에서 상환 항목을 추가해주세요.</div>`;
  const hDone=DB.items.filter(it=>(DB.month[it.id]||{}).husbandChecked).length;
  const wDone=DB.items.filter(it=>(DB.month[it.id]||{}).wifeDone).length;
  const hAll=hDone===DB.items.length, wAll=wDone===DB.items.length;
  const totAmt=totalRepay();
  const pending=DB.items.filter(it=>(DB.month[it.id]||{}).adjustRequest);

  let sc='';
  if(wAll) sc=`<div class="sc done"><div class="sc-ico">🎉</div><div class="sc-title">이번달 정산 완료!</div><div class="sc-sub">${W(totAmt)} 처리 완료</div></div>`;
  else if(!hAll) sc=`<div class="sc wait"><div class="sc-ico">⏳</div><div class="sc-title">남편 확인 대기 중</div><div class="sc-sub">남편이 확인해야 입금 처리할 수 있어요</div><div class="pl"><span>남편 확인</span><span>${hDone}/${DB.items.length}</span></div><div class="prog-bar"><div class="prog-fill purple" style="width:${Math.round(hDone/Math.max(DB.items.length,1)*100)}%"></div></div></div>`;
  else sc=`<div class="sc ready"><div class="sc-ico">✅</div><div class="sc-title">입금할 차례!</div><div class="sc-sub">아래 항목 순서대로 입금 후 체크해주세요</div><div class="sc-amt">${W(totAmt)}</div><div class="pl"><span>입금 현황</span><span>${wDone}/${DB.items.length}</span></div><div class="prog-bar"><div class="prog-fill blue" style="width:${Math.round(wDone/Math.max(DB.items.length,1)*100)}%"></div></div></div>`;

  let reqHTML='';
  if(pending.length){
    reqHTML=`<div class="sec"><div class="sec-hdr"><div class="sec-title">⚠️ 금액 수정 요청 ${pending.length}건</div></div>
      ${pending.map(it=>{const req=DB.month[it.id].adjustRequest;return`<div class="li req">
        <div class="li-ico yellow">✏️</div>
        <div class="li-body"><div class="li-name">${it.name}</div><div class="li-sub">기존 ${W(it.amount)} → 요청 <strong style="color:var(--purple)">${W(req.amount)}</strong> "${req.reason||''}"</div></div>
        <div class="li-r" style="flex-direction:column;gap:4px"><button class="btn-approve" onclick="approveAdj('${it.id}')">승인</button><button class="btn-danger" onclick="rejectAdj('${it.id}')">거절</button></div>
      </div>`;}).join('')}
    </div>`;
  }

  const cats=[...new Set(DB.items.map(it=>it.cat))];
  const list=cats.map(cat=>{
    const its=DB.items.filter(it=>it.cat===cat);
    const catAmt=its.reduce((s,it)=>s+getAmt(it),0);
    return`<div class="sec">${'<div class="sec-hdr"><div class="sec-title">'+cat+'</div><div class="sec-total">'+W(catAmt)+'</div></div>'}${its.map(it=>repayRow(it,'wife')).join('')}</div>`;
  }).join('');
  return sc+reqHTML+list;
}

function rRepayHusband(){
  const perm=`<div class="perm-box"><div class="pi">🔒</div><div><strong>확인 및 보고만 가능</strong><p>금액 이상 없으면 ✓ 체크, 변동 있으면 수정 요청. 최종 승인은 아내가 해요.</p></div></div>`;
  if(!DB.items.length)return perm+`<div class="empty"><div class="empty-ico">📭</div><p>아내가 항목을 등록하면 여기에 나타나요</p></div>`;
  const doneCnt=DB.items.filter(it=>(DB.month[it.id]||{}).husbandChecked).length;
  const allDone=doneCnt===DB.items.length;
  const totAmt=totalRepay();
  const sc=allDone
    ?`<div class="sc done"><div class="sc-ico">✅</div><div class="sc-title">확인 완료!</div><div class="sc-sub">아내에게 전달됐어요 · ${W(totAmt)}</div></div>`
    :`<div class="sc wait"><div class="sc-ico">👀</div><div class="sc-title">이번달 상환 확인</div><div class="sc-sub">금액이 맞으면 ✓ 체크, 변동 있으면 수정 요청해주세요</div><div class="pl"><span>확인 현황</span><span>${doneCnt}/${DB.items.length}</span></div><div class="prog-bar"><div class="prog-fill purple" style="width:${Math.round(doneCnt/Math.max(DB.items.length,1)*100)}%"></div></div></div>`;
  const allBtn=!allDone?`<button class="btn-p purple" onclick="hCheckAll()" style="margin-bottom:12px">전체 이상없음 확인</button>`:'';
  const cats=[...new Set(DB.items.map(it=>it.cat))];
  const list=cats.map(cat=>{
    const its=DB.items.filter(it=>it.cat===cat);
    const catAmt=its.reduce((s,it)=>s+getAmt(it),0);
    return`<div class="sec"><div class="sec-hdr"><div class="sec-title">${cat}</div><div class="sec-total">${W(catAmt)}</div></div>${its.map(it=>repayRow(it,'husband')).join('')}</div>`;
  }).join('');
  return perm+sc+allBtn+list;
}

function repayRow(item,viewer){
  const md=DB.month[item.id]||{};
  const amt=getAmt(item);
  const isModified=md.adjustedAmount!==undefined&&md.adjustedAmount!==item.amount;
  const hCk=!!md.husbandChecked, wDone=!!md.wifeDone, hasReq=!!md.adjustRequest;
  let rowCls=wDone?'done':hCk?'pend':'';
  const cb=viewer==='husband'
    ?`<div class="cb-vis ${hCk?'pon':''}" onclick="hToggle('${item.id}')">${hCk?'✓':''}</div>`
    :`<div class="cb-vis ${hCk?'pon':''}" style="cursor:default">${hCk?'✓':''}</div>`;
  const wBtn=viewer==='wife'
    ?`<button onclick="wToggle('${item.id}')" style="margin-top:4px;padding:5px 10px;border-radius:7px;border:none;cursor:pointer;font-family:inherit;font-size:11px;font-weight:700;background:${wDone?'var(--green-l)':'var(--blue-l)'};color:${wDone?'var(--green)':'var(--blue)'}">${wDone?'✓ 입금완료':'입금 처리'}</button>`:'';
  const reqBtn=viewer==='husband'&&!hCk&&!hasReq
    ?`<button onclick="openReq('${item.id}',${amt})" style="font-size:10px;color:var(--t3);background:none;border:none;cursor:pointer;margin-top:3px;font-family:inherit;text-decoration:underline">금액 수정 요청</button>`:'';
  const reqPend=hasReq?`<span class="tag tag-yellow" style="margin-top:4px;display:inline-flex">수정요청중</span>`:'';
  return`<div class="li ${rowCls}" id="ri-${item.id}">
    ${cb}
    <div class="li-body">
      <div class="li-name">${item.name}</div>
      <div class="li-sub"><span style="font-family:monospace">${item.bank||''} ${item.account||''}</span>${hCk?'<span class="tag tag-purple">남편확인</span>':'<span class="tag tag-gray">대기</span>'}${wDone?'<span class="tag tag-green">입금완료</span>':''}${isModified?'<span class="tag tag-yellow">금액변동</span>':''}</div>
      <div id="adj-${item.id}"></div>
      ${reqPend}${reqBtn}${wBtn}
    </div>
    <div style="text-align:right;flex-shrink:0">
      <div class="li-amt ${isModified?'red':''}">${W(amt)}</div>
      ${isModified?`<div style="font-size:11px;color:var(--t4);text-decoration:line-through">${W(item.amount)}</div>`:''}
      <div class="li-date">매월 ${item.dueDay||'-'}일</div>
    </div>
  </div>`;
}

window.addItem=async function(){
  const name=v('in-name'),amt=Number(v('in-amt'));
  if(!name||!amt)return toast('항목명과 금액을 입력해주세요','⚠️');

  await dbSet(P.items,{list:DB.items});
  toast('추가됐어요','📋');
  ['in-name','in-amt','in-bank','in-acct','in-day'].forEach(i=>{const e=document.getElementById(i);if(e)e.value='';});
};
window.delItem=async function(id){
  if(!confirm('삭제할까요?'))return;
  DB.items=DB.items.filter(it=>it.id!==id);
  await dbSet(P.items,{list:DB.items});toast('삭제됐어요','🗑');
};
window.wToggle=async function(id){
  const md=DB.month[id]||{};
  if(!md.husbandChecked)return toast('남편 확인 후 처리할 수 있어요','⚠️');
  if(!DB.month[id])DB.month[id]={};
  DB.month[id].wifeDone=!DB.month[id].wifeDone;
  DB.month[id].wifeDoneAt=DB.month[id].wifeDone?new Date().toISOString():null;
  await dbSet(P.month(Y,M),DB.month);
  const it=DB.items.find(x=>x.id===id);
  if(DB.month[id].wifeDone)toast(`${it?.name} 입금 완료!`,'💸');
};
window.hToggle=async function(id){
  if(!DB.month[id])DB.month[id]={};
  DB.month[id].husbandChecked=!DB.month[id].husbandChecked;
  DB.month[id].husbandCheckedAt=DB.month[id].husbandChecked?new Date().toISOString():null;
  if(DB.month[id].husbandChecked)delete DB.month[id].adjustRequest;
  await dbSet(P.month(Y,M),DB.month);
  const it=DB.items.find(x=>x.id===id);
  if(DB.month[id].husbandChecked)toast(`${it?.name} 확인했어요`,'✅');
};
window.hCheckAll=async function(){
  DB.items.forEach(it=>{if(!DB.month[it.id])DB.month[it.id]={};DB.month[it.id].husbandChecked=true;DB.month[it.id].husbandCheckedAt=new Date().toISOString();});
  await dbSet(P.month(Y,M),DB.month);toast('전체 확인 완료!','✅');
};
window.openReq=function(id,curAmt){
  const wrap=document.getElementById(`adj-${id}`);if(!wrap)return;
  wrap.innerHTML=`<div class="edit-wrap">
    <input class="edit-inp" id="ead-${id}" type="number" value="${curAmt}" inputmode="numeric" placeholder="수정 금액">
    <input class="edit-inp" id="ear-${id}" style="width:90px" placeholder="사유">
    <button class="edit-save" onclick="submitReq('${id}')">요청</button>
    <button class="edit-cancel" onclick="document.getElementById('adj-${id}').innerHTML=''">취소</button>
  </div>`;
};
window.submitReq=async function(id){
  const amt=Number(document.getElementById(`ead-${id}`)?.value);
  const reason=document.getElementById(`ear-${id}`)?.value||'';
  if(!amt)return toast('금액을 입력해주세요','⚠️');
  if(!DB.month[id])DB.month[id]={};
  DB.month[id].adjustRequest={amount:amt,reason,requestedAt:new Date().toISOString()};
  await dbSet(P.month(Y,M),DB.month);
  toast('수정 요청을 보냈어요','📨');
};
window.approveAdj=async function(id){
  const req=DB.month[id]?.adjustRequest;if(!req)return;
  DB.month[id].adjustedAmount=req.amount;DB.month[id].adjustedAt=new Date().toISOString();
  delete DB.month[id].adjustRequest;
  await dbSet(P.month(Y,M),DB.month);toast('금액 수정 승인했어요','✅');
};
window.rejectAdj=async function(id){
  delete DB.month[id].adjustRequest;
  await dbSet(P.month(Y,M),DB.month);toast('수정 요청 거절했어요','❌');
};

function rFinCalendar(){
  if(!selDate)selDate=td();
  const ym=mk(Y,M);

  // 거래 수집
  const allInc=Object.entries(DB.finance.income||{}).map(([id,e])=>({id,type:'income',...e}));
  const approvedExp=Object.entries(DB.finance.expenses||{}).filter(([,e])=>!e.pendingApproval).map(([id,e])=>({id,type:'expense',...e}));
  const pendExp=Object.entries(DB.finance.expenses||{}).filter(([,e])=>e.pendingApproval).map(([id,e])=>({id,type:'expense',pending:true,...e}));

  // 합계
  const totInc=allInc.reduce((s,e)=>s+Number(e.amount||0),0);
  const totVarExp=approvedExp.reduce((s,e)=>s+Number(e.amount||0),0);
  const fixedSum=(DB.fixed||[]).filter(f=>f.active!==false&&(f.priceHistory||[]).some(h=>h.from<=ym)).reduce((s,f)=>s+getFixedPrice(f,ym),0);
  const totExp=totVarExp+fixedSum+totalCards()+totalRepay();
  const balance=totInc-totExp;

  // 날짜별 그룹화
  const byDate={};
  [...allInc,...approvedExp].forEach(e=>{
    const d=e.date||ym+'-01';
    if(!byDate[d])byDate[d]={inc:0,exp:0,items:[]};
    if(e.type==='income')byDate[d].inc+=Number(e.amount||0);
    else byDate[d].exp+=Number(e.amount||0);
    byDate[d].items.push(e);
  });

  // 달력 그리드
  const firstDow=new Date(Y,M-1,1).getDay();
  const daysInMonth=new Date(Y,M,0).getDate();
  let calRows='',day=1;
  for(let row=0;row<6;row++){
    if(day>daysInMonth)break;
    let rowHtml='';
    for(let col=0;col<7;col++){
      const idx=row*7+col;
      if(idx<firstDow||day>daysInMonth){
        rowHtml+=`<div class="cal-cell"></div>`;
      } else {
        const ds=`${Y}-${String(M).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        const isToday=ds===td();const isSel=ds===selDate;
        const dd=byDate[ds];
        const dnCls='cal-dn'+(isToday?' today':'')+(col===0?' sun':col===6?' sat':'');
        rowHtml+=`<div class="cal-cell${isSel?' sel':''}" onclick="selDay('${ds}')">
          <div class="${dnCls}">${day}</div>
          ${dd?.inc?`<div class="cal-inc">+${shortW(dd.inc)}</div>`:''}
          ${dd?.exp?`<div class="cal-exp">-${shortW(dd.exp)}</div>`:''}
        </div>`;
        day++;
      }
    }
    calRows+=`<div class="cal-row">${rowHtml}</div>`;
  }

  // 선택 날 거래 목록
  const selItems=(byDate[selDate]?.items||[]).slice().sort((a,b)=>a.type==='income'?-1:1);
  const pendForDay=pendExp.filter(e=>e.date===selDate);
  const selDateLabel=selDate?new Date(selDate+'T12:00:00').toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'}):'-';

  const txRows=[...selItems,...pendForDay].map(e=>{
    const ico=CAT_ICONS[e.cat]||'📦';
    const who=e.who||(e.byHusband?'남편':'송희');
    const isInc=e.type==='income';
    const canDel=role==='wife'||(role==='husband'&&e.byHusband&&!e.pending);
    return`<div class="tx-item">
      <div class="tx-ico">${ico}</div>
      <div class="tx-body">
        <div class="tx-name">${e.memo||e.cat||'-'}</div>
        <div class="tx-sub">${e.cat||'-'} · ${who}${e.pending?` · <span style="color:var(--yellow);font-weight:700">미확인</span>`:''}</div>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <div class="tx-amt${isInc?' pos':''}">${isInc?'+':'−'}${W(e.amount)}</div>
        ${canDel?`<button class="xbtn" onclick="${isInc?`delIncome('${e.id}')`:`delExp('${e.id}')`}">×</button>`:''}
        ${e.pending&&role==='wife'?`<button class="btn-approve" style="font-size:10px;padding:4px 8px" onclick="approveExp('${e.id}')">확인</button>`:''}
      </div>
    </div>`;
  }).join('');

  const pendCount=pendExp.length;
  const pendAlert=role==='wife'&&pendCount?`<div class="notice yellow" style="margin-bottom:10px">⚠️ 남편 미확인 지출 ${pendCount}건이 있어요</div>`:'';

  return`${pendAlert}<div class="fin-sbar">
    <div><div class="fsb-label">입금</div><div class="fsb-val" style="color:#0ab">+${W(totInc)}</div></div>
    <div class="fsb-sep"></div>
    <div><div class="fsb-label">지출</div><div class="fsb-val">-${W(totExp)}</div></div>
    <div class="fsb-sep"></div>
    <div><div class="fsb-label">잔액</div><div class="fsb-val" style="color:${balance>=0?'#0ab':'var(--red)'}">${balance>=0?'+':''}${W(balance)}</div></div>
  </div>
  <div class="cal-wrap">
    <div class="cal-dow"><span style="color:var(--red)">일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span style="color:var(--blue)">토</span></div>
    ${calRows}
  </div>
  <div style="display:flex;align-items:center;justify-content:space-between;padding:2px 0">
    <div class="tx-day-hdr">${selDateLabel}</div>
    ${role==='wife'?`<button class="fin-mgmt-btn" onclick="setTab('finance','settings')">⚙️ 관리</button>`:''}
  </div>
  ${txRows?`<div>${txRows}</div>`:`<div style="padding:16px 4px;text-align:center;color:var(--t4);font-size:13px">${selDateLabel} 내역이 없어요</div>`}
  <div style="height:80px"></div>
  <button class="fin-fab" onclick="openAddModal()">+ 가계부 등록</button>`;
}

function rFinSummary(){
  const inc=totalInc(), repay=totalRepay(), cards=totalCards(), other=totalOther();
  const totalExp=repay+cards+other, bal=inc-totalExp;
  const pct=n=>inc?Math.round(n/inc*100):0;

  const hero=`<div class="hero blue">
    <div class="hero-label">${Y}년 ${M}월 수입</div>
    <div class="hero-amount">${W(inc)}</div>
    <div class="hero-row">
      <div><div class="hsl">총 지출</div><div class="hsv">${W(totalExp)}</div></div>
      <div><div class="hsl">잔액</div><div class="hsv" style="color:${bal>=0?'#a8d8ea':'#ffaaaa'}">${W(bal)}</div></div>
    </div>
  </div>`;

  const stats=`<div class="stat-grid sg3">
    <div class="stat"><div class="stat-label">고정상환</div><div class="stat-val c-red" style="font-size:16px">${W(repay)}</div><div class="stat-sub">${pct(repay)}%</div></div>
    <div class="stat"><div class="stat-label">카드청구</div><div class="stat-val c-yellow" style="font-size:16px">${W(cards)}</div><div class="stat-sub">${pct(cards)}%</div></div>
    <div class="stat"><div class="stat-label">기타지출</div><div class="stat-val" style="font-size:16px">${W(other)}</div><div class="stat-sub">${pct(other)}%</div></div>
  </div>`;

  const flowRows=[
    {label:'💰 수입',amt:inc,color:'var(--blue)',pct:100},
    {label:'💳 고정상환',amt:repay,color:'var(--red)',pct:pct(repay)},
    {label:'🃏 카드청구',amt:cards,color:'var(--yellow)',pct:pct(cards)},
    {label:'🛒 기타지출',amt:other,color:'var(--t3)',pct:pct(other)},
  ];
  const flow=`<div style="background:var(--surface);border-radius:16px;border:1px solid var(--border);padding:16px;margin-bottom:12px">
    <div style="font-size:13px;font-weight:700;color:var(--t2);margin-bottom:14px">수입 대비 지출</div>
    ${flowRows.map(r=>`<div style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;font-size:13px;font-weight:600;margin-bottom:4px">
        <span>${r.label}</span><span>${W(r.amt)} <span style="color:var(--t4);font-weight:400;font-size:12px">${r.pct}%</span></span>
      </div>
      <div class="prog-bar"><div class="prog-fill" style="width:${r.pct}%;background:${r.color}"></div></div>
    </div>`).join('')}
    <div style="display:flex;justify-content:space-between;padding-top:12px;border-top:1px solid var(--border);font-size:14px;font-weight:800">
      <span>잔액</span><span style="color:${bal>=0?'var(--green)':'var(--red)'}">${W(bal)}</span>
    </div>
  </div>`;

  // 카드 미리보기
  const cardAmtsM=DB.finance.cards||{};
  const cardPrev=DB.cards.length?`<div class="sec">
    <div class="sec-hdr"><div class="sec-title">카드 청구</div><div class="sec-total">${W(cards)}</div></div>
    ${DB.cards.map(c=>`<div class="li"><div class="li-ico yellow">🃏</div><div class="li-body"><div class="li-name">${c.name}</div><div class="li-sub">${c.dueDay?`결제일 ${c.dueDay}일`:''}</div></div><div class="li-amt red">${cardAmtsM[c.id]?W(cardAmtsM[c.id]):'미입력'}</div></div>`).join('')}
  </div>`:'';

  // 남편 미확인 지출 알림 (아내만)
  const pendExps=Object.values(DB.finance.expenses||{}).filter(e=>e.pendingApproval);
  const pendAlert=role==='wife'&&pendExps.length?`<div class="notice yellow"><strong>⚠️ 남편이 보고한 지출 ${pendExps.length}건이 확인을 기다려요</strong>기타지출 탭에서 확인해주세요.</div>`:'';

  return hero+stats+flow+pendAlert+cardPrev;
}

function rFinCard(){
  const canEdit=role==='wife';
  const amts=DB.finance.cards||{};
  const total=DB.cards.reduce((s,c)=>s+Number(amts[c.id]||0),0);
  const perm=!canEdit?`<div class="perm-box"><div class="pi">🔒</div><div><strong>조회만 가능</strong><p>카드 청구액 관리는 아내가 해요.</p></div></div>`:'';

  if(!DB.cards.length){
    const noCard=`<div class="empty"><div class="empty-ico">🃏</div><p>등록된 카드가 없어요${canEdit?'<br>아래에서 카드사를 먼저 등록해주세요':''}</p></div>`;
    const addForm=canEdit?regCardForm():'';
    return perm+noCard+addForm;
  }

  // 이번달 청구액 입력 폼
  const amtForm=canEdit?`<div class="form-card">
    <div class="form-ttl">이번달 청구액 입력</div>
    ${DB.cards.map(c=>`<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
      <div style="flex:1">
        <div style="font-size:14px;font-weight:700">${c.name}</div>
        ${c.dueDay?`<div style="font-size:11px;color:var(--t3)">매월 ${c.dueDay}일 결제</div>`:''}
      </div>
      <input type="number" id="ca-${c.id}" value="${amts[c.id]||''}" placeholder="0" inputmode="numeric"
        style="width:140px;background:var(--sf2);border:1.5px solid var(--border);border-radius:9px;padding:10px 12px;font-size:15px;font-weight:700;font-family:inherit;text-align:right;outline:none">
    </div>`).join('')}
    <button class="btn-p" onclick="saveCardAmts()">저장하기</button>
  </div>`:
  `<div class="form-card">
    <div class="form-ttl">이번달 카드 청구</div>
    ${DB.cards.map(c=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)">
      <div><div style="font-size:14px;font-weight:700">${c.name}</div>${c.dueDay?`<div style="font-size:11px;color:var(--t3)">매월 ${c.dueDay}일 결제</div>`:''}</div>
      <div style="font-size:16px;font-weight:900;color:${amts[c.id]?'var(--red)':'var(--t4)'}">${amts[c.id]?W(amts[c.id]):'미입력'}</div>
    </div>`).join('')}
    <div style="display:flex;justify-content:space-between;align-items:center;padding-top:12px;font-size:15px;font-weight:800"><span>합계</span><span style="color:var(--red)">${W(total)}</span></div>
  </div>`;

  const addForm=canEdit?regCardForm():'';
  return perm+amtForm+addForm;
}

  return`<div class="form-card" style="border:1px solid var(--border)">
    <div class="form-ttl">카드사 관리</div>
    <div class="fr2">
      <div class="field"><label>카드사명</label><input id="c-name" placeholder="삼성카드"></div>
      <div class="field"><label>결제일</label><input type="number" id="c-day" placeholder="15" min="1" max="31" inputmode="numeric"></div>
    </div>
    <button class="btn-p" onclick="addCardCompany()" style="margin-top:8px">+ 카드 추가</button>
    ${DB.cards.length?`<div style="margin-top:14px;border-top:1px solid var(--border);padding-top:12px">
      ${DB.cards.map(c=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">
        <span style="font-size:13px;font-weight:600">${c.name}${c.dueDay?` · ${c.dueDay}일`:''}</span>
        <button class="xbtn" onclick="delCardCompany('${c.id}')">×</button>

}

function rFinExpense(){
  const ym=mk(Y,M);
  const cats=activeCats();
  const catOpts=cats.map(c=>`<option>${c}</option>`).join('');
  const canEdit=role==='wife';

  // ── 고정지출 섹션 ──
  const activeFixed=(DB.fixed||[]).filter(f=>f.active!==false&&(f.priceHistory||[]).some(h=>h.from<=ym));
  const fixedTotal=activeFixed.reduce((s,f)=>s+getFixedPrice(f,ym),0);
  const fixedRows=activeFixed.map(f=>{
    const price=getFixedPrice(f,ym);
    return`<div class="li">
      <div class="li-ico blue">🔄</div>
      <div class="li-body">
        <div class="li-name">${f.name||f.cat}</div>
        <div class="li-sub">${f.cat} · 매월 반복 <span class="tag tag-blue">고정</span></div>
        <div id="fpe-${f.id}"></div>
      </div>
      <div class="li-r" style="gap:4px;flex-direction:column;align-items:flex-end">
        <div class="li-amt red">${W(price)}</div>
        ${canEdit?`<button onclick="openFixedEdit('${f.id}')" style="font-size:10px;color:var(--blue);background:none;border:none;cursor:pointer;font-family:inherit;white-space:nowrap">금액 변경</button>
        <button onclick="stopFixed('${f.id}')" style="font-size:10px;color:var(--t4);background:none;border:none;cursor:pointer;font-family:inherit">중단</button>`:''}
      </div>
    </div>`;
  }).join('');
  const fixedSec=`<div class="sec" style="margin-bottom:12px">
    <div class="sec-hdr"><div class="sec-title">🔄 고정지출</div><div class="sec-total">${W(fixedTotal)}</div></div>
    ${activeFixed.length?fixedRows:`<div class="empty" style="padding:20px 16px"><p>등록된 고정지출이 없어요</p></div>`}
  </div>`;

  // ── 지출 추가 폼 ──
  const husbandNote=role==='husband'?`<div class="notice yellow" style="margin-bottom:10px"><strong>📌 보고 방식</strong>아내가 확인 전까지 잔액에 미반영돼요.</div>`:'';
  const fixedToggle=canEdit?`<label style="display:flex;align-items:center;gap:8px;padding:10px 0;border-top:1px solid var(--border);cursor:pointer">
    <input type="checkbox" id="e-is-fixed" style="width:18px;height:18px;accent-color:var(--blue)" onchange="toggleFixedUI()">
    <span style="font-size:13px;font-weight:600;color:var(--blue)">🔄 매월 반복 (고정지출)</span>
  </label>`:'';
  const form=`<div class="form-card">
    <div class="form-ttl">${role==='husband'?'지출 보고':'지출 추가'}</div>
    ${husbandNote}
    <div class="fr2">
      <div class="field"><label>카테고리</label><select id="e-cat">${catOpts}</select></div>
      <div class="field" id="e-date-wrap"><label>날짜</label><input type="date" id="e-date"></div>
    </div>
    <div class="field"><label>금액</label><input type="number" id="e-amt" placeholder="0" inputmode="numeric"></div>
    <div class="field"><label>내용</label><input id="e-memo" placeholder="예: 마트 장보기"></div>
    ${fixedToggle}
    <button class="btn-p ${role==='husband'?'purple':''}" onclick="addExpense()">${role==='husband'?'보고하기':'추가하기'}</button>
  </div>`;

  // ── 남편 보고 대기 ──
  const exps=Object.entries(DB.finance.expenses||{});
  const pendExps=exps.filter(([,e])=>e.pendingApproval);
  const confExps=exps.filter(([,e])=>!e.pendingApproval);
  const confTotal=confExps.reduce((s,[,e])=>s+Number(e.amount||0),0);
  const pendHTML=canEdit&&pendExps.length?`<div class="sec" style="margin-bottom:12px">
    <div class="sec-hdr"><div class="sec-title">⚠️ 남편 보고 ${pendExps.length}건</div></div>
    ${pendExps.map(([id,e])=>`<div class="li req">
      <div class="li-ico purple">📋</div>
      <div class="li-body"><div class="li-name">${e.memo||e.cat}</div><div class="li-sub">${e.cat} · ${e.date} <span class="tag tag-purple">남편보고</span></div></div>
      <div class="li-r"><div class="li-amt red">${W(e.amount)}</div><button class="btn-approve" onclick="approveExp('${id}')">확인</button><button class="xbtn" onclick="delExp('${id}')">×</button></div>
    </div>`).join('')}
  </div>`:'';

  // ── 변동지출 목록 ──
  const varList=confExps.length?`<div class="sec" style="margin-bottom:12px">
    <div class="sec-hdr"><div class="sec-title">변동지출</div><div class="sec-total">${W(confTotal)}</div></div>
    ${confExps.map(([id,e])=>`<div class="li">
      <div class="li-ico gray">🛒</div>
      <div class="li-body"><div class="li-name">${e.memo||e.cat}</div><div class="li-sub">${e.cat} · ${e.date}${e.byHusband?' · <span class="tag tag-purple">남편</span>':''}</div></div>
      <div class="li-r"><div class="li-amt">${W(e.amount)}</div>${canEdit?`<button class="xbtn" onclick="delExp('${id}')">×</button>`:''}</div>
    </div>`).join('')}
  </div>`:''

  // ── 카테고리 관리 (아내만) ──
  const allCats=DB.cats.length?DB.cats:DEFAULT_CATS.map((n,i)=>({id:'d'+i,name:n,deleted:false}));
  const delCats=allCats.filter(c=>c.deleted);
  const catMgmt=canEdit?`<div class="form-card" style="margin-top:4px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div class="form-ttl" style="margin:0">카테고리 관리</div>
    </div>
    <div class="fr2" style="margin-bottom:10px">
      <div class="field" style="margin:0"><label>새 카테고리</label><input id="new-cat-name" placeholder="예: 외식"></div>
      <div style="display:flex;align-items:flex-end"><button class="btn-p" style="margin:0;padding:10px 14px;font-size:13px" onclick="addCat()">+ 추가</button></div>
    </div>
    ${allCats.filter(c=>!c.deleted).map(c=>`<div style="display:flex;align-items:center;gap:6px;padding:7px 0;border-bottom:1px solid var(--border)">
      <div id="cat-view-${c.id}" style="display:flex;align-items:center;gap:6px;flex:1">
        <span style="font-size:13px;font-weight:600;flex:1">${c.name}</span>
        <button onclick="openCatEdit('${c.id}')" style="font-size:11px;color:var(--blue);background:none;border:none;cursor:pointer;font-family:inherit">수정</button>
        <button onclick="deleteCat('${c.id}')" style="font-size:11px;color:var(--red);background:none;border:none;cursor:pointer;font-family:inherit">삭제</button>
      </div>
      <div id="cat-edit-${c.id}" style="display:none;flex:1;gap:6px;align-items:center">
        <input id="cat-inp-${c.id}" value="${c.name}" style="flex:1;background:var(--sf2);border:1.5px solid var(--blue);border-radius:8px;padding:6px 10px;font-size:13px;font-family:inherit;outline:none">
        <button onclick="saveCatEdit('${c.id}')" class="edit-save">저장</button>
        <button onclick="cancelCatEdit('${c.id}')" class="edit-cancel">취소</button>
      </div>
    </div>`).join('')}
    ${delCats.length?`<div style="margin-top:10px;padding-top:8px;border-top:1px dashed var(--border)">
      <div style="font-size:11px;font-weight:700;color:var(--t3);margin-bottom:6px">🗄 삭제됨 (Firebase 보관 중)</div>
      ${delCats.map(c=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:5px 0">
        <span style="font-size:12px;color:var(--t3)">${c.name}</span>
        <button onclick="restoreCat('${c.id}')" style="font-size:11px;color:var(--green);background:none;border:none;cursor:pointer;font-family:inherit">복원</button>
      </div>`).join('')}
    </div>`:''}
  </div>`:'';

  return fixedSec+form+pendHTML+varList+catMgmt;
}

  const form=`<div class="form-card">
    <div class="form-ttl">${role==='husband'?'월급 입력':'수입 추가'}</div>
    ${husbandNote}
    <div class="fr2">
      <div class="field"><label>구분</label><select id="i-cat">${role==='husband'?'<option>월급</option>':'<option>월급</option><option>부업</option><option>이자/배당</option><option>기타</option>'}</select></div>
      <div class="field"><label>날짜</label><input type="date" id="i-date"></div>
    </div>
    <div class="field"><label>금액</label><input type="number" id="i-amt" placeholder="0" inputmode="numeric"></div>
    <div class="field"><label>메모</label><input id="i-memo" placeholder="예: 3월 급여"></div>
    <button class="btn-p ${role==='husband'?'purple':''}" onclick="addIncome()">입력하기</button>
  </div>`;
  const list=incs.length?`<div class="sec"><div class="sec-hdr"><div class="sec-title">수입 내역</div><div class="sec-total" style="color:var(--blue)">${W(total)}</div></div>
    ${incs.map(([id,v])=>`<div class="li">
      <div class="li-ico blue">💰</div>
      <div class="li-body"><div class="li-name">${v.memo||v.cat}</div><div class="li-sub">${v.cat} · ${v.date}${v.byHusband?' · <span class="tag tag-purple">남편입력</span>':''}</div></div>
      <div class="li-r"><div class="li-amt pos">${W(v.amount)}</div>${role==='wife'?`<button class="xbtn" onclick="delIncome('${id}')">×</button>`:''}</div>
    </div>`).join('')}</div>`
    :`<div class="empty"><div class="empty-ico">💰</div><p>수입 내역이 없어요</p></div>`;

// 가계 액션
window.addCardCompany=async function(){
  const name=v('c-name');if(!name)return toast('카드사명을 입력해주세요','⚠️');
  DB.cards.push({id:uid(),name,dueDay:v('c-day')});
  await dbSet(P.cards,{list:DB.cards});
  ['c-name','c-day'].forEach(i=>{const e=document.getElementById(i);if(e)e.value='';});
  toast(name+' 등록됐어요','🃏');
};
window.delCardCompany=async function(id){
  if(!confirm('카드를 삭제할까요?'))return;
  DB.cards=DB.cards.filter(c=>c.id!==id);
  await dbSet(P.cards,{list:DB.cards});toast('삭제됐어요','🗑');
};
window.saveCardAmts=async function(){
  if(!DB.finance.cards)DB.finance.cards={};
  DB.cards.forEach(c=>{const el=document.getElementById(`ca-${c.id}`);if(el)DB.finance.cards[c.id]=Number(el.value)||0;});
  await dbSet(P.finance(Y,M),DB.finance);toast('저장됐어요','✅');
};

window.toggleFixedUI=function(){
  const isFixed=document.getElementById('e-is-fixed')?.checked;
  const wrap=document.getElementById('e-date-wrap');
  if(wrap)wrap.style.display=isFixed?'none':'';
};

window.addExpense=async function(){
  const amt=Number(v('e-amt'));if(!amt)return toast('금액을 입력해주세요','⚠️');
  const isFixed=document.getElementById('e-is-fixed')?.checked;
  if(isFixed){
    const name=v('e-memo')||v('e-cat');
    const newFixed={id:uid(),name,cat:v('e-cat'),active:true,priceHistory:[{amount:amt,from:mk(Y,M)}],addedAt:td()};
    DB.fixed.push(newFixed);
    await dbSet(P.fixed,{list:DB.fixed});
    toast('고정지출 등록됐어요','🔄');
    ['e-amt','e-memo'].forEach(i=>{const e=document.getElementById(i);if(e)e.value='';});
    const cb=document.getElementById('e-is-fixed');if(cb){cb.checked=false;toggleFixedUI();}
    return;
  }
  if(!DB.finance.expenses)DB.finance.expenses={};
  const entry={cat:v('e-cat'),amount:amt,memo:v('e-memo'),date:v('e-date')||td(),addedAt:td()};
  if(role==='husband'){entry.byHusband=true;entry.pendingApproval=true;}
  DB.finance.expenses[uid()]=entry;
  await dbSet(P.finance(Y,M),DB.finance);
  toast(role==='husband'?'보고됐어요. 아내가 확인할 거예요':'지출 추가됐어요',role==='husband'?'📨':'🛒');
  ['e-amt','e-memo'].forEach(i=>{const e=document.getElementById(i);if(e)e.value='';});
};
window.approveExp=async function(id){
  DB.finance.expenses[id].pendingApproval=false;DB.finance.expenses[id].approvedAt=td();
  await dbSet(P.finance(Y,M),DB.finance);toast('지출 확인했어요','✅');
};
window.delExp=async function(id){delete DB.finance.expenses[id];await dbSet(P.finance(Y,M),DB.finance);toast('삭제됐어요','🗑');};

window.addIncome=async function(){
  const amt=Number(v('i-amt'));if(!amt)return toast('금액을 입력해주세요','⚠️');
  if(!DB.finance.income)DB.finance.income={};
  DB.finance.income[uid()]={cat:v('i-cat'),amount:amt,memo:v('i-memo'),date:v('i-date')||td(),byHusband:role==='husband',addedAt:td()};
  await dbSet(P.finance(Y,M),DB.finance);
  toast(role==='husband'?'월급 입력됐어요':'수입 추가됐어요','💰');
  ['i-amt','i-memo'].forEach(i=>{const e=document.getElementById(i);if(e)e.value='';});
};
window.delIncome=async function(id){delete DB.finance.income[id];await dbSet(P.finance(Y,M),DB.finance);toast('삭제됐어요','🗑');};

// ── 고정지출 관리 ──
window.openFixedEdit=function(id){
  const el=document.getElementById(`fpe-${id}`);if(!el)return;
  el.innerHTML=`<div style="margin-top:6px;padding:8px;background:var(--sf2);border-radius:8px;border:1px solid var(--blue)">
    <div style="font-size:11px;font-weight:700;color:var(--blue);margin-bottom:6px">금액 변경</div>
    <div style="display:flex;gap:6px;align-items:center">
      <input type="month" id="fp-from-${id}" value="${mk(Y,M)}" style="background:var(--sf2);border:1.5px solid var(--border);border-radius:7px;padding:5px 8px;font-size:12px;font-family:inherit;outline:none;flex:1">
      <input type="number" id="fp-amt-${id}" placeholder="새 금액" inputmode="numeric" style="background:var(--sf2);border:1.5px solid var(--border);border-radius:7px;padding:5px 8px;font-size:12px;font-family:inherit;outline:none;flex:1">
      <button onclick="applyFixedPrice('${id}')" style="padding:5px 10px;background:var(--blue);color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">적용</button>
    </div>
  </div>`;
};

window.applyFixedPrice=async function(id){
  const newAmt=Number(document.getElementById(`fp-amt-${id}`)?.value);
  const fromMon=document.getElementById(`fp-from-${id}`)?.value;
  if(!newAmt)return toast('금액을 입력해주세요','⚠️');
  if(!fromMon)return toast('적용 월을 선택해주세요','⚠️');
  const item=DB.fixed.find(f=>f.id===id);if(!item)return;
  if(!item.priceHistory)item.priceHistory=[];
  item.priceHistory=item.priceHistory.filter(h=>h.from!==fromMon);
  item.priceHistory.push({amount:newAmt,from:fromMon});
  await dbSet(P.fixed,{list:DB.fixed});
  toast(`${fromMon}부터 ${W(newAmt)} 적용됐어요`,'✅');
  renderFinance();
};

window.stopFixed=async function(id){
  if(!confirm('이 고정지출을 중단할까요?'))return;
  const item=DB.fixed.find(f=>f.id===id);if(!item)return;
  _lastAction={type:'stopFixed',id};
  item.active=false;
  await dbSet(P.fixed,{list:DB.fixed});
  showUndoToast('고정지출이 중단됐어요');
};

// ── undo 토스트 ──
function showUndoToast(msg){
  const el=document.createElement('div');
  el.className='toast';
  el.style.pointerEvents='auto';
  el.innerHTML=`<span>✅</span><span style="flex:1">${msg}</span><button onclick="undoLastAction()" style="background:#fff;color:var(--blue);border:none;border-radius:6px;padding:4px 10px;font-size:12px;font-weight:800;cursor:pointer;font-family:inherit;white-space:nowrap">되돌리기</button>`;
  document.getElementById('toasts').appendChild(el);
  if(window._undoT)clearTimeout(window._undoT);
  window._undoT=setTimeout(()=>{el.style.transition='opacity .25s';el.style.opacity='0';setTimeout(()=>{el.remove();_lastAction=null;},250);},10000);
}

window.undoLastAction=async function(){
  if(!_lastAction)return;
  const a=_lastAction;_lastAction=null;
  if(a.type==='stopFixed'){
    const item=DB.fixed.find(f=>f.id===a.id);
    if(item){item.active=true;await dbSet(P.fixed,{list:DB.fixed});}
    toast('고정지출이 복구됐어요','↩️');
  }else if(a.type==='deleteCat'){
    const item=DB.cats.find(c=>c.id===a.id);
    if(item){item.deleted=false;await dbSet(P.cats,{list:DB.cats});}
    toast('카테고리 복원됐어요','↩️');
  }else if(a.type==='editCat'){
    const item=DB.cats.find(c=>c.id===a.id);
    if(item){item.name=a.prevName;await dbSet(P.cats,{list:DB.cats});}
    toast('카테고리 이름이 복원됐어요','↩️');
  }
};

// ── 카테고리 관리 ──
window.addCat=async function(){
  const name=(document.getElementById('new-cat-name')?.value||'').trim();
  if(!name)return toast('카테고리명을 입력해주세요','⚠️');
  if(!DB.cats.length)DB.cats=DEFAULT_CATS.map((n,i)=>({id:'d'+i,name:n,deleted:false}));
  if(DB.cats.some(c=>c.name===name&&!c.deleted))return toast('이미 있는 카테고리예요','⚠️');
  DB.cats.push({id:uid(),name,deleted:false});
  await dbSet(P.cats,{list:DB.cats});
  const el=document.getElementById('new-cat-name');if(el)el.value='';
  toast(name+' 추가됐어요','🏷');
};

window.openCatEdit=function(id){
  const view=document.getElementById(`cat-view-${id}`);
  const edit=document.getElementById(`cat-edit-${id}`);
  if(view)view.style.display='none';
  if(edit)edit.style.display='flex';
};

window.cancelCatEdit=function(id){
  const view=document.getElementById(`cat-view-${id}`);
  const edit=document.getElementById(`cat-edit-${id}`);
  if(view)view.style.display='flex';
  if(edit)edit.style.display='none';
};

window.saveCatEdit=async function(id){
  const newName=(document.getElementById(`cat-inp-${id}`)?.value||'').trim();
  if(!newName)return toast('카테고리명을 입력해주세요','⚠️');
  const item=DB.cats.find(c=>c.id===id);if(!item)return;
  _lastAction={type:'editCat',id,prevName:item.name};
  item.name=newName;
  await dbSet(P.cats,{list:DB.cats});
  showUndoToast(`"${newName}"으로 수정됐어요`);
};

window.deleteCat=async function(id){
  const item=DB.cats.find(c=>c.id===id);if(!item)return;
  if(!confirm(`"${item.name}" 카테고리를 삭제할까요?\nFirebase에 보관되며 언제든 복원할 수 있어요.`))return;
  _lastAction={type:'deleteCat',id,name:item.name};
  item.deleted=true;
  await dbSet(P.cats,{list:DB.cats});
  showUndoToast(`"${item.name}" 삭제됐어요`);
};

window.restoreCat=async function(id){
  const item=DB.cats.find(c=>c.id===id);if(!item)return;
  item.deleted=false;
  await dbSet(P.cats,{list:DB.cats});
  toast(item.name+' 복원됐어요','↩️');
};

window.switchMType=function(type){

window.setFinWho=function(id){

};

window.saveEntry=async function(){
  const type=window._mtype||'expense';
  const amt=Number(document.getElementById('m-amt')?.value);
  if(!amt)return toast('금액을 입력해주세요','⚠️');
  const date=document.getElementById('m-date')?.value||td();
  const memo=(document.getElementById('m-memo')?.value||'').trim();
  const who=document.querySelector('.who-item.sel .who-name')?.textContent||'';
  const cat=document.querySelector('.cat-item.sel .cat-lbl')?.textContent||'기타';
  selDate=date;
  if(type==='income'){
    if(!DB.finance.income)DB.finance.income={};
    DB.finance.income[uid()]={cat,amount:amt,memo,date,who,byHusband:role==='husband',addedAt:td()};
    await dbSet(P.finance(Y,M),DB.finance);
    toast('수입 추가됐어요','💰');
  } else {
    if(!DB.finance.expenses)DB.finance.expenses={};
    const entry={cat,amount:amt,memo,date,who,addedAt:td()};
    if(role==='husband'){entry.byHusband=true;entry.pendingApproval=true;}
    DB.finance.expenses[uid()]=entry;
    await dbSet(P.finance(Y,M),DB.finance);
    toast(role==='husband'?'보고됐어요':'지출 추가됐어요',role==='husband'?'📨':'🛒');
  }
  closeAddModal();
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function renderDebt(){
  const el=document.getElementById('pDebt');

  el.innerHTML=`<div class="tab-bar" style="grid-template-columns:repeat(4,1fr)">
    <button class="tab ${tab==='sheet1'?'on':''}" onclick="setTab('debt','sheet1')" style="font-size:12px">대출현황</button>
    <button class="tab ${tab==='sheet2'?'on':''}" onclick="setTab('debt','sheet2')" style="font-size:12px">공동·카드론</button>
    <button class="tab ${tab==='sheet3'?'on':''}" onclick="setTab('debt','sheet3')" style="font-size:12px">코인내역</button>
    <button class="tab ${tab==='sheet4'?'on':''}" onclick="setTab('debt','sheet4')" style="font-size:12px">고정지출</button>

function dLock(at){return`<div style="background:var(--red-l);border:1px solid rgba(240,68,82,.2);border-radius:12px;padding:12px 16px;margin-bottom:12px;display:flex;gap:10px;align-items:center"><span style="font-size:20px">🔒</span><div><div style="font-size:13px;font-weight:800;color:var(--red)">제출 완료 — 수정 불가</div><div style="font-size:11px;color:var(--t2);margin-top:2px">${at?new Date(at).toLocaleString('ko-KR',{dateStyle:'short',timeStyle:'short'}):''}에 제출됨</div></div></div>`;}
function dWait(){return`<div class="notice yellow"><strong>⏳ 남편이 아직 작성 전이에요</strong>남편이 제출하면 여기서 확인할 수 있어요.</div>`;}
function dSubmitBtn(sheet,n,msg){return`<div style="background:var(--red-l);border:1px solid rgba(240,68,82,.2);border-radius:12px;padding:16px;margin-bottom:12px"><div style="font-size:13px;font-weight:800;color:var(--red);margin-bottom:5px">⚠️ 제출 전 확인</div><div style="font-size:12px;color:var(--t2);margin-bottom:12px;line-height:1.6">제출 후에는 수정할 수 없어요.<br>${msg||n+'개 항목이 등록돼 있어요.'}</div><button class="btn-p" style="background:var(--red);margin-top:0" onclick="debtSubmit('${sheet}')">최종 제출 (수정 불가)</button></div>`;}
function dFld(label,val,cls){return`<div><span style="color:var(--t3);font-size:11px;font-weight:600">${label}</span><div class="${cls||''}" style="font-size:13px;font-weight:600;margin-top:2px;word-break:break-all">${val||'-'}</div></div>`;}
function dTA(label,id,val,ph){return`<div class="field"><label>${label}</label><textarea id="${id}" rows="3" style="width:100%;background:var(--sf2);border:1.5px solid transparent;border-radius:9px;padding:11px 13px;font-size:14px;font-family:inherit;color:var(--t1);outline:none;resize:vertical" placeholder="${ph||''}">${val||''}</textarea></div>`;}

// ─── 시트1: 대출 현황 ─────────────────────────────
function rDebtS1(){
  const s=DB.debt?.sheet1||{};
  const loans=s.loans||[];
  const sub=!!s.submitted;
  const totO=loans.reduce((a,l)=>a+Number(l.origAmt||0),0);
  const totR=loans.reduce((a,l)=>a+Number(l.remainPrincipal||0),0);
  const totM=loans.reduce((a,l)=>a+Number(l.monthlyPrincipal||0)+Number(l.monthlyInterest||0),0);
  const stats=loans.length?`<div class="stat-grid sg3" style="margin-bottom:12px">
    <div class="stat"><div class="stat-label">대출 총액</div><div class="stat-val c-red" style="font-size:15px">${W(totO)}</div></div>
    <div class="stat"><div class="stat-label">잔여 원금</div><div class="stat-val c-yellow" style="font-size:15px">${W(totR)}</div></div>
    <div class="stat"><div class="stat-label">월 납입 합계</div><div class="stat-val c-purple" style="font-size:15px">${W(totM)}</div></div>
  </div>`:'';
  const typeColor=t=>t==='신용대출'?'blue':t==='담보대출'?'green':(t==='카드론'||t==='현금서비스')?'yellow':'gray';
  const cards=loans.map((l,i)=>`<div class="sec" style="margin-bottom:10px">
    <div class="sec-hdr">
      <div class="sec-title">📄 ${l.lenderName||'대출 '+(i+1)}</div>
      <div style="display:flex;align-items:center;gap:6px">
        <span class="tag tag-${typeColor(l.type)}">${l.type||'-'}</span>
        ${!sub&&role==='husband'?`<button class="xbtn" onclick="debtDelLoan(${i})">×</button>`:''}
      </div>
    </div>
    <div style="padding:12px 16px;display:grid;grid-template-columns:1fr 1fr;gap:8px 16px">
      ${dFld('② 대출 받은 날짜',l.loanDate)}${dFld('④ 대출금(처음 총액)',W(l.origAmt),'c-red')}
      ${dFld('⑤ 현재 잔여 원금',W(l.remainPrincipal),'c-yellow')}${dFld('⑥ 이자율',l.rate?l.rate+'%':'-')}
      ${dFld('⑦ 대출 기간',l.termMonths?l.termMonths+'개월':'-')}${dFld('⑧ 만료일',l.expireDate)}
      ${dFld('⑨ 월 납입 원금',W(l.monthlyPrincipal))}${dFld('⑨ 월 납입 이자',W(l.monthlyInterest))}
      ${dFld('⑩ 상환/남은 횟수',(l.repaidCount||'-')+'회 / '+(l.remainCount||'-')+'회')}
      ${dFld('⑪ 연체 여부',l.overdue,l.overdue&&l.overdue!=='없음'?'c-red':'')}
      ${dFld('⑫ 담보 여부',l.collateral)}
      <div style="grid-column:1/-1">${dFld('⑬ 대출 받은 사유',l.reason)}</div>
    </div>
  </div>`).join('');
  if(sub) return dLock(s.submittedAt)+stats+(loans.length?cards:`<div class="empty"><div class="empty-ico">📋</div><p>등록된 대출이 없어요</p></div>`);
  if(role==='wife') return (loans.length?'':dWait())+stats+cards;
  const csvCard=`<div class="form-card" style="border:2px dashed var(--blue);background:var(--blue-l);margin-bottom:12px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px"><span style="font-size:22px">📥</span>
    <div><div style="font-size:13px;font-weight:800;color:var(--blue)">구글 시트로 일괄 등록</div>
    <div style="font-size:12px;color:var(--t3);margin-top:1px">템플릿 ⬇️ → 구글 시트에 작성 → 파일 &gt; CSV 다운로드 → ⬆️ 업로드</div></div></div>
    <div style="display:flex;gap:8px">
      <label for="ds1Up" style="flex:2;padding:11px;background:var(--blue);color:#fff;border-radius:10px;font-size:13px;font-weight:700;text-align:center;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px">⬆️ CSV 업로드</label>
      <input type="file" id="ds1Up" accept=".csv,.xlsx,.xls" style="display:none" onchange="handleDebtUpload(event,'s1')">
      <button onclick="downloadDebtTmpl('s1')" style="flex:1;padding:11px;background:#fff;color:var(--blue);border:1.5px solid var(--blue);border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">템플릿 ⬇️</button>
    </div>
    <div id="ds1Preview"></div>
  </div>`;
  const form=`<div class="form-card">
    <div class="form-ttl">+ 대출 직접 입력</div>
    <div class="field"><label>① 대출/은행명 · 지인/가족명</label><input id="dl-lender" placeholder="예: 국민은행 · 홍길동 형"></div>
    <div class="fr2">
      <div class="field"><label>② 대출 받은 날짜</label><input type="date" id="dl-date"></div>
      <div class="field"><label>③ 대출 유형</label><select id="dl-type"><option>신용대출</option><option>담보대출</option><option>카드론</option><option>현금서비스</option><option>지인/가족</option><option>기타</option></select></div>
    </div>
    <div class="fr2">
      <div class="field"><label>④ 대출금 (처음 총액)</label><input type="number" id="dl-orig" placeholder="0" inputmode="numeric"></div>
      <div class="field"><label>⑤ 현재 잔여 원금</label><input type="number" id="dl-remain" placeholder="0" inputmode="numeric"></div>
    </div>
    <div class="fr2">
      <div class="field"><label>⑥ 이자율 (%)</label><input type="number" id="dl-rate" placeholder="4.5" step="0.01" inputmode="decimal"></div>
      <div class="field"><label>⑦ 대출 기간 (개월)</label><input type="number" id="dl-term" placeholder="36" inputmode="numeric"></div>
    </div>
    <div class="fr2">
      <div class="field"><label>⑧ 만료일</label><input type="date" id="dl-expire"></div>
      <div class="field"><label>⑨ 월 납입 원금</label><input type="number" id="dl-mp" placeholder="0" inputmode="numeric"></div>
    </div>
    <div class="fr2">
      <div class="field"><label>⑨ 월 납입 이자</label><input type="number" id="dl-mi" placeholder="0" inputmode="numeric"></div>
      <div class="field"><label>⑩ 상환 횟수</label><input type="number" id="dl-rc" placeholder="12" inputmode="numeric"></div>
    </div>
    <div class="fr2">
      <div class="field"><label>⑩ 남은 횟수</label><input type="number" id="dl-rl" placeholder="24" inputmode="numeric"></div>
      <div class="field"><label>⑪ 연체 여부</label><select id="dl-over"><option>없음</option><option>1번</option><option>2번</option><option>3번 이상</option></select></div>
    </div>
    <div class="fr2">
      <div class="field"><label>⑫ 담보 여부</label><select id="dl-coll"><option>신용(무담보)</option><option>부동산담보</option><option>자동차담보</option><option>기타담보</option></select></div>
      <div class="field"><label>⑬ 대출 받은 사유</label><input id="dl-reason" placeholder="예: 생활비 부족"></div>
    </div>
    <button class="btn-p purple" onclick="debtAddLoan()">+ 대출 추가</button>
  </div>`;
  return csvCard+(loans.length?stats+cards+dSubmitBtn('sheet1',loans.length):'')+form;
}

// ─── 시트2: 공동명의 / 카드론 / 지인차용 ──────────
function rDebtS2(){
  const s=DB.debt?.sheet2||{};
  const sub=!!s.submitted;
  const ji=s.jointItems||[];
  const cl=s.cardLoans||[];
  const pl=s.personalLoans||[];

  // 공동명의 섹션
  const jiSec=ji.length?`<div class="sec" style="margin-bottom:10px">
    <div class="sec-hdr"><div class="sec-title">① 공동명의 여부</div><div class="sec-total">${W(ji.reduce((a,x)=>a+Number(x.amount||0),0))}</div></div>
    ${ji.map((x,i)=>`<div class="li"><div class="li-ico blue">📝</div>
      <div class="li-body"><div class="li-name">${x.name||'-'}</div>
      <div class="li-sub"><span class="tag tag-${x.hasJoint==='있음'?'red':'gray'}">${x.hasJoint||'-'}</span> ${x.jointType||''} ${x.note?'· '+x.note:''}</div></div>
      <div class="li-r"><div class="li-amt red">${x.amount?W(x.amount):'-'}</div>${!sub&&role==='husband'?`<button class="xbtn" onclick="debtDelJoint(${i})">×</button>`:''}</div>
    </div>`).join('')}
  </div>`:'';

  // 카드론 섹션
  const clTotal=cl.reduce((a,x)=>a+Number(x.amt||0),0);
  const clSec=cl.length?`<div class="sec" style="margin-bottom:10px">
    <div class="sec-hdr"><div class="sec-title">② 카드론 / 현금서비스</div><div class="sec-total">${W(clTotal)}</div></div>
    ${cl.map((x,i)=>`<div class="li"><div class="li-ico yellow">🃏</div>
      <div class="li-body"><div class="li-name">${x.company||'-'}</div>
      <div class="li-sub">${x.type||''} ${x.date?'· '+x.date:''}</div>
      <div class="li-sub">현재잔액 <strong>${W(x.balance)}</strong> · 월납입 <strong>${W(x.monthly)}</strong></div></div>
      <div class="li-r"><div class="li-amt red">${W(x.amt)}</div>${!sub&&role==='husband'?`<button class="xbtn" onclick="debtDelCL(${i})">×</button>`:''}</div>
    </div>`).join('')}
  </div>`:'';
